    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI","Apple SD Gothic Neo",sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .char-card .char-name.sung   { color: var(--sung-dark);   }

    .nav-btn { background: var(--card); border: 2px solid var(--border); border-radius: 10px; width: 38px; height: 38px; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }

    .cal-grid { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); }

    .cal-day { background: var(--card); min-height: 72px; padding: 8px 8px 6px; cursor: pointer; transition: background .15s; }
    .cal-day:hover { background: #f5f3ff; }

    .cal-day.selected { background: #ede9fe; }
    .cal-day.other-month { background: #fafafa; }

    .day-num { font-size: 0.85rem; font-weight: 700; color: var(--text); width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
    .cal-day.sun .day-num { color: #ef4444; }
    .cal-day.sat .day-num { color: #3b82f6; }
    .cal-day.today.sun .day-num, .cal-day.today.sat .day-num { color: #fff; }
    .dot-row { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }

    .dot.jun    { background: var(--jun-main);    }
    .dot.sung   { background: var(--sung-main);   }

<script>
const firebaseConfig={apiKey:"AIzaSyBjlWA9GHPvL4sGEdOShwyaCnPDuLgIcPA",authDomain:"studylog-cd02a.firebaseapp.com",databaseURL:"https://studylog-cd02a-default-rtdb.firebaseio.com",projectId:"studylog-cd02a",storageBucket:"studylog-cd02a.firebasestorage.app",messagingSenderId:"714212261002",appId:"1:714212261002:web:075c8c992ba986b5a9c173"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
let currentYear=new Date().getFullYear(),currentMonth=new Date().getMonth(),selectedDate=null,monthData={},dbListener=null;
function pad(n){return String(n).padStart(2,"0");}
function dateKey(y,m,d){return y+"-"+pad(m+1)+"-"+pad(d);}
function todayKey(){const t=new Date();return dateKey(t.getFullYear(),t.getMonth(),t.getDate());}
function listenMonth(year,month){
  if(dbListener)dbListener();
  const prefix=year+"-"+pad(month+1);
  const ref=db.ref("studyLogs");
  dbListener=ref.orderByKey().startAt(prefix+"-01").endAt(prefix+"-31").on("value",snap=>{
    monthData={};
    snap.forEach(child=>{monthData[child.key]=child.val();});
    renderCalendar();
    if(selectedDate)refreshPanel();
    document.getElementById("loading-overlay").style.display="none";
  },err=>{console.error(err);document.getElementById("loading-overlay").style.display="none";});
}
function renderCalendar(){
  const label=document.getElementById("month-label");
  label.textContent=currentYear+"&#45380; "+(currentMonth+1)+"&#50900;";
  const container=document.getElementById("cal-days");
  container.innerHTML="";
  const firstDay=new Date(currentYear,currentMonth,1).getDay();
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  const daysInPrev=new Date(currentYear,currentMonth,0).getDate();
  for(let i=0;i<firstDay;i++){container.appendChild(makeCell(currentYear,currentMonth-1,daysInPrev-firstDay+1+i,true));}
  for(let d=1;d<=daysInMonth;d++){container.appendChild(makeCell(currentYear,currentMonth,d,false));}
  const trailing=(firstDay+daysInMonth)%7===0?0:7-(firstDay+daysInMonth)%7;
  for(let d=1;d<=trailing;d++){container.appendChild(makeCell(currentYear,currentMonth+1,d,true));}
}
function makeCell(y,m,d,otherMonth){
  const key=dateKey(y,m,d);
  const div=document.createElement("div");
  div.className="cal-day";
  const dow=new Date(y,m,d).getDay();
  if(dow===0)div.classList.add("sun");
  if(dow===6)div.classList.add("sat");
  if(otherMonth)div.classList.add("other-month");
  if(key===todayKey())div.classList.add("today");
  if(key===selectedDate)div.classList.add("selected");
  const numDiv=document.createElement("div");
  numDiv.className="day-num";numDiv.textContent=d;div.appendChild(numDiv);
  const data=monthData[key];
  if(data){
    const dotRow=document.createElement("div");dotRow.className="dot-row";
    if(data.nyeong&&data.nyeong.trim()){const dot=document.createElement("div");dot.className="dot nyeong";dotRow.appendChild(dot);}
    if(data.jun&&data.jun.trim()){const dot=document.createElement("div");dot.className="dot jun";dotRow.appendChild(dot);}
    if(data.sung&&data.sung.trim()){const dot=document.createElement("div");dot.className="dot sung";dotRow.appendChild(dot);}
    if(dotRow.children.length)div.appendChild(dotRow);
  }
  div.addEventListener("click",()=>{selectedDate=key;openPanel(key);renderCalendar();});
  return div;
}
function openPanel(key){
  document.getElementById("detail-panel").classList.add("open");
  const parts=key.split("-");const y=parts[0],m=parts[1],d=parts[2];
  const dt=new Date(+y,+m-1,+d);
  const weeks=["&#51068;","&#50900;","&#54868;","&#49688;","&#47785;","&#44552;","&#53664;"];
  document.getElementById("detail-date-title").textContent=y+"&#45380; "+(+m)+"&#50900; "+(+d)+"&#51068; ("+weeks[dt.getDay()]+")";
  refreshPanel();
}
function refreshPanel(){
  if(!selectedDate)return;
  const data=monthData[selectedDate]||{};
  document.getElementById("ta-nyeong").value=data.nyeong||"";
  document.getElementById("ta-jun").value=data.jun||"";
  document.getElementById("ta-sung").value=data.sung||"";
  updateCharBanner(data);
  document.getElementById("save-status").textContent="";
  document.getElementById("save-status").className="save-status";
}
function updateCharBanner(data){
  setCard("card-nyeong","active-nyeong",data&&data.nyeong&&data.nyeong.trim());
  setCard("card-jun","active-jun",data&&data.jun&&data.jun.trim());
  setCard("card-sung","active-sung",data&&data.sung&&data.sung.trim());
}
function setCard(id,activeClass,active){
  const el=document.getElementById(id);
  el.classList.remove("inactive",activeClass);
  el.classList.add(active?activeClass:"inactive");
}
function closePanel(){
  document.getElementById("detail-panel").classList.remove("open");
  selectedDate=null;renderCalendar();
  ["card-nyeong","card-jun","card-sung"].forEach(id=>{document.getElementById(id).className="char-card inactive";});
}
async function saveEntry(){
  if(!selectedDate)return;
  const nyeong=document.getElementById("ta-nyeong").value.trim();
  const jun=document.getElementById("ta-jun").value.trim();
  const sung=document.getElementById("ta-sung").value.trim();
  const status=document.getElementById("save-status");
  status.className="save-status";status.textContent="&#51200;&#51109; &#51473;&#8230;";
  try{
    if(!nyeong&&!jun&&!sung){await db.ref("studyLogs/"+selectedDate).remove();}
    else{await db.ref("studyLogs/"+selectedDate).set({nyeong,jun,sung});}
    status.textContent="&#9989; &#51200;&#51109;&#46103;&#50612;&#50836;!";status.className="save-status ok";
  }catch(e){status.textContent="&#10060; &#51200;&#51109; &#49892;&#54328;: "+e.message;status.className="save-status err";}
}
async function clearEntry(){
  if(!selectedDate)return;
  if(!confirm("&#51060; &#45216;&#51032; &#44592;&#47197;&#51012; &#47784;&#46160; &#49325;&#51228;&#54624;&#44060;&#50836;?"))return;
  const status=document.getElementById("save-status");
  status.className="save-status";status.textContent="&#49325;&#51228; &#51473;&#8230;";
  try{
    await db.ref("studyLogs/"+selectedDate).remove();
    document.getElementById("ta-nyeong").value="";
    document.getElementById("ta-jun").value="";
    document.getElementById("ta-sung").value="";
    status.textContent="&#128465; &#49325;&#51228;&#46103;&#50612;&#50836;!";status.className="save-status ok";
  }catch(e){status.textContent="&#10060; &#49892;&#54328;: "+e.message;status.className="save-status err";}
}
document.getElementById("prev-btn").addEventListener("click",()=>{currentMonth--;if(currentMonth<0){currentMonth=11;currentYear--;}selectedDate=null;document.getElementById("detail-panel").classList.remove("open");listenMonth(currentYear,currentMonth);});
document.getElementById("next-btn").addEventListener("click",()=>{currentMonth++;if(currentMonth>11){currentMonth=0;currentYear++;}selectedDate=null;document.getElementById("detail-panel").classList.remove("open");listenMonth(currentYear,currentMonth);});
document.getElementById("close-btn").addEventListener("click",closePanel);
document.getElementById("save-btn").addEventListener("click",saveEntry);
document.getElementById("clear-btn").addEventListener("click",clearEntry);
listenMonth(currentYear,currentMonth);
</script>
</body>
</html>
