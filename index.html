<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>📚 공부 캘린더 – 녕·준·숭·뽀</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
:root{--bg:#f8f7ff;--card:#fff;--text:#1e1b4b;--muted:#9ca3af;--border:#e5e7eb;--r:16px;--sh:0 4px 20px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Apple SD Gothic Neo",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:18px 24px 14px;text-align:center}
header h1{font-size:1.5rem;font-weight:800}
.logo-title{font-family:'Pacifico',cursive!important;font-size:1.9rem!important;font-weight:400!important;letter-spacing:1px}
header p{font-size:.82rem;opacity:.85;margin-top:3px}
.banner{display:flex;gap:10px;justify-content:center;padding:18px 12px 0;flex-wrap:wrap}
.cc{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--card);border-radius:var(--r);padding:11px 14px;box-shadow:var(--sh);border:3px solid rgba(150,150,150,0.18);transition:border-color .4s,box-shadow .25s,transform .25s;min-width:88px;position:relative;cursor:pointer;user-select:none}
.cc:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.fw{position:relative;flex-shrink:0}
.fw svg{position:absolute;top:0;left:0}
.fw .grey{filter:grayscale(1) opacity(.35)}
.fw .fclip{position:absolute;bottom:0;left:0;overflow:hidden;transition:clip-path 0.45s cubic-bezier(0.34,1.56,0.64,1)}
.fw .fclip svg{position:absolute;bottom:0;left:0}
.cn{font-size:.88rem;font-weight:800;color:var(--ccd)}
.stats-row{display:flex;gap:3px;flex-wrap:wrap;justify-content:center}
.sb{display:inline-flex;align-items:center;gap:2px;font-size:.64rem;font-weight:700;padding:2px 5px;border-radius:20px;white-space:nowrap}
.sb-d{background:#ede9fe;color:#7e22ce}.sb-s{background:#fef3c7;color:#b45309}
.rank-badge{position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:900;border:2px solid #fff}
.r1{background:#f59e0b;color:#fff}.r2{background:#94a3b8;color:#fff}.r3{background:#b45309;color:#fff}.r4{background:#6b7280;color:#fff}
.sel-strip{display:none;align-items:center;justify-content:center;gap:10px;margin:10px 16px 0;padding:8px 16px;background:#ede9fe;border-radius:10px;font-size:.82rem;font-weight:700;color:#4338ca}
.sel-strip.show{display:flex}
.sel-strip-hint{font-size:.72rem;color:#7c3aed;font-weight:500}
.sel-clear{background:none;border:none;font-size:1.1rem;cursor:pointer;color:#7c3aed;line-height:1;margin-left:auto}
.panel{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:18px;display:none;margin:10px 16px 0;max-width:600px}
@media(min-width:600px){.panel{margin-left:auto;margin-right:auto}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.panel.open{display:block;animation:slideDown .18s ease}
.p-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:11px;border-bottom:2px solid var(--border)}
.p-hdr-left{display:flex;flex-direction:column;gap:2px}
.p-date{font-size:.72rem;color:var(--muted);font-weight:600}
.p-person{display:flex;align-items:center;gap:7px;font-size:.95rem;font-weight:800}
.xbtn{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);line-height:1;padding:0 4px;flex-shrink:0}
.xbtn:hover{color:var(--text)}
.task-list{display:flex;flex-direction:column;gap:6px}
.task-row{display:flex;align-items:center;gap:6px}
.task-input{flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:.84rem;font-family:inherit;outline:none;background:#fafafa;transition:border-color .2s}
.task-input:focus{background:#fff}
.ck-btn{width:28px;height:28px;border-radius:8px;border:2px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;transition:all .2s;color:transparent}
.ck-btn.done{color:#fff;border-color:var(--ccc,#667eea);background:var(--ccc,#667eea)}
.task-del{width:24px;height:24px;border-radius:7px;border:none;background:#fee2e2;color:#dc2626;cursor:pointer;font-size:.9rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .2s}
.task-del:hover{background:#fca5a5}
.add-task-btn{font-size:.75rem;color:var(--muted);background:none;border:1.5px dashed var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;width:100%;transition:all .2s;margin-top:4px}
.add-task-btn:hover{border-color:#667eea;color:#667eea}
.save-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;padding:9px 0;font-size:.88rem;font-weight:700;cursor:pointer;width:100%;margin-top:10px;transition:opacity .2s}
.save-btn:hover{opacity:.88}
.status{text-align:center;font-size:.78rem;margin-top:7px;min-height:17px;color:var(--muted)}
.status.ok{color:#059669}.status.err{color:#dc2626}
.pick-area{text-align:center;margin:10px 0 0}
.pick-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;padding:8px 20px;font-size:.85rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.pick-btn:disabled{background:#d1d5db;color:#9ca3af;cursor:not-allowed}
.pick-note{font-size:.72rem;color:var(--muted);margin-top:4px}
.wrap{padding:18px 18px 40px;max-width:700px;margin:0 auto}
.cal-wrap{width:100%}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-hdr h2{font-size:1.2rem;font-weight:800}
.nav-btn{background:var(--card);border:2px solid var(--border);border-radius:10px;width:36px;height:36px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nav-btn:hover{background:#ede9fe;border-color:#c084fc}
.cal-grid{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.wdays{display:grid;grid-template-columns:repeat(7,1fr);background:linear-gradient(135deg,#667eea,#764ba2)}
.wdays span{text-align:center;padding:9px 0;font-size:.75rem;font-weight:700;color:rgba(255,255,255,.9)}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.day{background:var(--card);min-height:70px;padding:7px 7px 5px;cursor:pointer;transition:background .15s}
.day:hover{background:#f5f3ff}.day.sel{background:#ede9fe}.day.om{background:#fafafa}.day.om .dn{color:var(--muted)}
.day.today .dn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.dn{font-size:.82rem;font-weight:700;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.day.sun .dn{color:#ef4444}.day.sat .dn{color:#3b82f6}
.day.today.sun .dn,.day.today.sat .dn{color:#fff}
.dots{display:flex;gap:2px;flex-wrap:wrap;margin-top:3px}
.dot{width:7px;height:7px;border-radius:50%}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:center;justify-content:center;padding:14px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:20px;padding:22px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:1.1rem;font-weight:800;margin-bottom:2px}
.modal-sub{font-size:.78rem;color:var(--muted);margin-bottom:14px}
.rank-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;background:#f8f7ff;border-radius:12px;padding:10px}
.rrow{display:flex;align-items:center;gap:9px;padding:6px 9px;border-radius:9px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.rnum{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:900;flex-shrink:0}
.rinfo{flex:1}.rname{font-weight:800;font-size:.88rem}.rscore{font-size:.7rem;color:var(--muted)}
.psec-label{font-size:.82rem;font-weight:700;margin-bottom:6px;color:#374151}
.person-sel{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.pbtn{flex:1;min-width:60px;padding:8px 4px;border:2px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;font-size:.83rem;font-weight:700;transition:all .2s;color:var(--text);white-space:nowrap}
.pbtn.active{border-color:#667eea;background:#ede9fe;color:#4338ca}
.char-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:0}
.copt{border:3px solid var(--border);border-radius:12px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:#fafafa}
.copt:hover:not(.taken):not(.view-only){transform:scale(1.05);border-color:#667eea;background:#f5f3ff}
.copt.cpicked{border-color:#667eea;background:#ede9fe;box-shadow:0 0 0 2px #667eea44}
.copt.taken{opacity:.42;cursor:not-allowed}
.copt.view-only{cursor:default}
.copt .cname{font-size:.65rem;font-weight:700;margin-top:3px;color:var(--text)}
.taken-lbl{position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:.56rem;font-weight:700;color:#6366f1}
.mfooter{display:flex;gap:8px;margin-top:14px}
.mbtn{flex:1;padding:10px;border:none;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer}
.mok{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.mno{background:#f3f4f6;color:var(--text)}
.view-info-box{background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:.82rem;color:#0369a1;line-height:1.7}
#ov{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;font-size:1rem;font-weight:600;color:#667eea}
.sp{width:38px;height:38px;border:4px solid #e9d5ff;border-top-color:#667eea;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:800px){
  .wrap{padding:8px 4px 40px}
  .banner{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:12px 4px 0}
  .cc{min-width:0;padding:8px 3px}
  .cc .cn{font-size:.76rem}
  .cc .sb{font-size:.58rem;padding:1px 4px}
  .sel-strip{margin:8px 4px 0;font-size:.76rem;gap:6px}
  .sel-strip-hint{display:none}
  .panel{margin:8px 4px 0}
  .pick-area{margin:8px 4px 0}
  .cal-wrap{width:100%}
  .day{min-height:52px;padding:5px 3px 3px}
  .dn{font-size:.75rem}
  .dots{gap:2px}
  .dot{width:6px;height:6px}
  .char-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>

</div>

const PNAMES={ny:'녕',ju:'준',su:'숭',bbo:'뽀'};
const PS=['ny','ju','su','bbo'];
const DEFAULT_PICKS={ny:'bunny',ju:'bear',su:'fox',bbo:'pororo'};
const pad=n=>String(n).padStart(2,'0');
const kStr=(y,m,d)=>y+'-'+pad(m+1)+'-'+pad(d);
const todayK=()=>{const t=new Date();return kStr(t.getFullYear(),t.getMonth(),t.getDate());};
const fmtDate=k=>{var p=k.split('-');var w=['일','월','화','수','목','금','토'];return p[0]+'년 '+(+p[1])+'월 '+(+p[2])+'일 ('+w[new Date(+p[0],+p[1]-1,+p[2]).getDay()]+')';};
function hexToRgb(hex){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return [r,g,b];}
let CY=new Date().getFullYear(),CM=new Date().getMonth();
let sel=null,editPerson=null,monthData={},allData={};
let picks=Object.assign({},DEFAULT_PICKS);
let stats={ny:{days:0,streak:0},ju:{days:0,streak:0},su:{days:0,streak:0},bbo:{days:0,streak:0}};
let listenRef=null,listenCb=null;
let pperson=null,pselected=null,pickerStats=null;
function mkSvg(id,sz){return '<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" style="width:'+sz+'px;height:'+sz+'px;display:block">'+CHARS[id].svg+'</svg>';}
function mkFw(id,sz,fill){
  var pct=Math.round((1-fill)*100);
  var baseSvg=fill>0?CHARS[id].svg:(CHARS[id].svgSleep||CHARS[id].svg);
  return '<div class="fw" style="width:'+sz+'px;height:'+sz+'px">'+
    '<svg class="grey" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" style="width:'+sz+'px;height:'+sz+'px">'+baseSvg+'</svg>'+
    '<div class="fclip" style="clip-path:inset('+pct+'% 0 0 0);width:'+sz+'px;height:'+sz+'px">'+
      '<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" style="width:'+sz+'px;height:'+sz+'px;position:absolute;bottom:0;left:0">'+CHARS[id].svg+'</svg>'+
    '</div></div>';
}
function getFill(pData){
  if(!pData)return 0;
  if(typeof pData==='string')return pData.trim()?1:0;
  var total=0,done=0;
  for(var i=1;i<=3;i++){if(pData['t'+i]&&pData['t'+i].trim()){total++;if(pData['c'+i])done++;}}
  return total===0?0:done/total;
}
function hasAnyTask(pData){
  if(!pData)return false;
  if(typeof pData==='string')return pData.trim().length>0;
  for(var i=1;i<=3;i++){if(pData['t'+i]&&pData['t'+i].trim())return true;}
  return false;
}
function hasAnyChecked(pData){
  if(!pData)return false;
  if(typeof pData==='string')return false;
  for(var i=1;i<=3;i++){if(pData['t'+i]&&pData['t'+i].trim()&&pData['c'+i])return true;}
  return false;
}
db.ref('charPick').on('value',function(s){
  var v=s.val();
  if(!v||!v.initialized){picks=Object.assign({},DEFAULT_PICKS);if(!v)setTimeout(function(){openPicker(true);},800);}
  else{PS.forEach(function(p){if(v[p])picks[p]=v[p];});}
  renderBanner();updatePickBtn();
});
function calcStats(){
  var today=new Date();var curPre=today.getFullYear()+'-'+pad(today.getMonth()+1);
  var ns={ny:{days:0,streak:0},ju:{days:0,streak:0},su:{days:0,streak:0},bbo:{days:0,streak:0}};
  var src=monthData;
  if(CY!==today.getFullYear()||CM!==today.getMonth()){src={};Object.keys(allData).forEach(function(k){if(k.startsWith(curPre))src[k]=allData[k];});}
  Object.values(src).forEach(function(v){if(!v)return;PS.forEach(function(p){if(hasAnyChecked(v[p]))ns[p].days++;});});
  PS.forEach(function(p){
    var st=0,d=new Date(today);
    for(var i=0;i<90;i++){
      var k=kStr(d.getFullYear(),d.getMonth(),d.getDate());
      var vv=Object.assign({},allData[k]||{},monthData[k]||{});
      if(hasAnyChecked(vv[p])){st++;d.setDate(d.getDate()-1);}else break;
    }
    ns[p].streak=st;
  });
  stats=ns;renderBanner();
}
function getRanks(baseStats){var s=baseStats||stats;return PS.map(function(p){return{p:p,score:s[p].days*2+(s[p].streak||0)};}).sort(function(a,b){return b.score-a.score;});}
function renderBanner(){
  var ranks=getRanks();var rankOf={};ranks.forEach(function(r,i){rankOf[r.p]=i+1;});
  var displayKey=sel||todayK();var displayData=Object.assign({},allData[displayKey]||{},monthData[displayKey]||{});
  var bn=document.getElementById('banner');if(!bn)return;bn.innerHTML='';
  var medals=['👑','🥈','🥉','🏅'];var rcls=['r1','r2','r3','r4'];
  PS.forEach(function(p){
    var ch=CHARS[picks[p]],rank=rankOf[p],s=stats[p];
    var pData=displayData[p];
    if(typeof pData==='string'&&pData.trim())pData={t1:pData,c1:true};
    var fill=getFill(pData);var hasEntry=hasAnyTask(pData);
    var d=document.createElement('div');
    d.className='cc'+(sel?' sel-mode':'')+(hasEntry&&!sel?' has-entry':'');
    d.id='c-'+p;d.style.cssText='--cc:'+ch.color+';--ccl:'+ch.light+';--ccd:'+ch.dark+';--ccc:'+ch.color;
    var rgb=hexToRgb(ch.color);var alpha=0.18+fill*0.82;
    d.style.borderColor='rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+alpha+')';
    var bottomRow='<div class="stats-row"><span class="sb sb-d">📅'+s.days+'일</span></div>';
    d.innerHTML='<div class="rank-badge '+rcls[rank-1]+'">'+medals[rank-1]+'</div>'+mkFw(picks[p],58,fill)+'<span class="cn">'+PNAMES[p]+'</span>'+bottomRow;
    (function(pp){d.onclick=function(){openPersonEdit(pp);};})(p);
    bn.appendChild(d);
  });
}
function listen(y,m){
  if(listenRef&&listenCb){listenRef.off('value',listenCb);listenRef=null;listenCb=null;}
  var pre=y+'-'+pad(m+1);
  listenRef=db.ref('studyLogs').orderByKey().startAt(pre+'-01').endAt(pre+'-31');
  listenCb=listenRef.on('value',function(s){
    monthData={};s.forEach(function(c){monthData[c.key]=c.val();});
    render();document.getElementById('ov').style.display='none';calcStats();
    if(editPerson)refreshPeHeader();
  },function(e){console.error(e);document.getElementById('ov').style.display='none';});
}
function render(){
  document.getElementById('mlabel').textContent=CY+'년 '+(CM+1)+'월';
  var c=document.getElementById('days');c.innerHTML='';
  var fd=new Date(CY,CM,1).getDay(),dim=new Date(CY,CM+1,0).getDate(),dip=new Date(CY,CM,0).getDate();
  for(var i=0;i<fd;i++)c.appendChild(cell(CY,CM-1,dip-fd+1+i,true));
  for(var d=1;d<=dim;d++)c.appendChild(cell(CY,CM,d,false));
  var tr=(fd+dim)%7===0?0:7-(fd+dim)%7;
  for(var d2=1;d2<=tr;d2++)c.appendChild(cell(CY,CM+1,d2,true));
}
function cell(y,m,d,om){
  var k=kStr(y,m,d),div=document.createElement('div');
  var dow=new Date(y,m,d).getDay();
  div.className='day'+(dow===0?' sun':dow===6?' sat':'')+(om?' om':'')+(k===todayK()?' today':'')+(k===sel?' sel':'');
  var dn=document.createElement('div');dn.className='dn';dn.textContent=d;div.appendChild(dn);
  var v=monthData[k];
  if(v){
    var dr=document.createElement('div');dr.className='dots';
    PS.forEach(function(p){
      var hasT=hasAnyTask(v[p]),hasC=hasAnyChecked(v[p]);
      if(hasT){
        var dot=document.createElement('div');dot.className='dot';
        var col=CHARS[picks[p]].color;
        if(hasC){dot.style.background=col;}
        else{dot.style.background='transparent';dot.style.border='1.5px solid '+col;dot.style.boxSizing='border-box';}
        dr.appendChild(dot);
      }
    });
    if(dr.children.length)div.appendChild(dr);
  }
  div.onclick=async function(){
    if(sel===k){await clearSel();return;}
    if(editPerson){await closePanel();}sel=k;render();renderBanner();
  };
  return div;
}
async function clearSel(){await closePanel();sel=null;render();renderBanner();}
async function openPersonEdit(p){
  if(!sel){sel=todayK();render();renderBanner();}
  if(editPerson&&editPerson!==p){await save(true);}
  editPerson=p;
  var panel=document.getElementById('panel');panel.classList.add('open');
  document.getElementById('st').textContent='';document.getElementById('st').className='status';
  buildPersonEdit();panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function getPersonData(p){
  var v=(monthData[sel]||{})[p]||{};
  if(typeof v==='string'&&v.trim())v={t1:v,c1:true};
  return v;
}
function refreshPeHeader(){
  if(!editPerson||!sel)return;
  var p=editPerson,ch=CHARS[picks[p]];
  var tasks=collectTasksFromDOM();var fill=getFill(tasks);
  var pe=document.getElementById('pperson');
  if(pe)pe.innerHTML=mkFw(picks[p],24,fill)+'<span style="color:'+ch.dark+'">'+PNAMES[p]+'의 공부</span>';
}
function buildPersonEdit(){
  var p=editPerson,ch=CHARS[picks[p]];var vp=getPersonData(p);var fill=getFill(vp);
  document.getElementById('pdate').textContent=fmtDate(sel);
  document.getElementById('pperson').innerHTML=mkFw(picks[p],24,fill)+'<span style="color:'+ch.dark+'">'+PNAMES[p]+'의 공부</span>';
  var tl=document.getElementById('ptasks');tl.innerHTML='';
  var existing=[];
  for(var i=1;i<=3;i++){if(vp['t'+i]&&vp['t'+i].trim())existing.push({t:vp['t'+i],c:!!vp['c'+i]});}
  if(existing.length===0)existing.push(null);
  existing.forEach(function(data){tl.appendChild(makeTaskRow(data,ch.color));});
  updateAddBtn();
}
function makeTaskRow(data,color){
  var row=document.createElement('div');row.className='task-row';
  var inp=document.createElement('input');inp.type='text';inp.className='task-input';inp.placeholder='공부할 내용…';inp.style.borderColor=color;
  if(data&&data.t)inp.value=data.t;
  inp.oninput=function(){updatePeFill();};
  var ckBtn=document.createElement('button');ckBtn.className='ck-btn';ckBtn.style.setProperty('--ccc',color);ckBtn.textContent='✓';
  if(data&&data.c)ckBtn.classList.add('done');
  ckBtn.onclick=function(){ckBtn.classList.toggle('done');updatePeFill();};
  var delBtn=document.createElement('button');delBtn.className='task-del';delBtn.textContent='×';
  delBtn.onclick=function(){
    row.remove();
    var tl=document.getElementById('ptasks');
    if(tl.querySelectorAll('.task-row').length===0)tl.appendChild(makeTaskRow(null,color));
    updateAddBtn();updatePeFill();
  };
  row.appendChild(inp);row.appendChild(ckBtn);row.appendChild(delBtn);
  return row;
}
function updateAddBtn(){
  var tl=document.getElementById('ptasks');if(!tl)return;
  var cnt=tl.querySelectorAll('.task-row').length;
  var btn=document.getElementById('addTaskBtn');
  if(btn)btn.style.display=cnt>=3?'none':'';
}
function updatePeFill(){
  var tasks=collectTasksFromDOM();var fill=getFill(tasks);var pct=Math.round((1-fill)*100);
  var fw=document.querySelector('#pperson .fclip');if(fw)fw.style.clipPath='inset('+pct+'% 0 0 0)';
  var greyFw=document.querySelector('#pperson .grey');
  if(greyFw&&editPerson)greyFw.innerHTML=fill>0?CHARS[picks[editPerson]].svg:(CHARS[picks[editPerson]].svgSleep||CHARS[picks[editPerson]].svg);
  var bcard=document.getElementById('c-'+editPerson);
  if(bcard){
    var bfw=bcard.querySelector('.fclip');if(bfw)bfw.style.clipPath='inset('+pct+'% 0 0 0)';
    var bGrey=bcard.querySelector('.grey');
    if(bGrey&&editPerson)bGrey.innerHTML=fill>0?CHARS[picks[editPerson]].svg:(CHARS[picks[editPerson]].svgSleep||CHARS[picks[editPerson]].svg);
    if(editPerson){var ch=CHARS[picks[editPerson]];var rgb=hexToRgb(ch.color);bcard.style.borderColor='rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+(0.18+fill*0.82)+')';}
  }
}
function collectTasksFromDOM(){
  var tl=document.getElementById('ptasks');if(!tl)return{};
  var obj={},idx=1;
  tl.querySelectorAll('.task-row').forEach(function(row){
    var inp=row.querySelector('.task-input');var ck=row.querySelector('.ck-btn');
    if(inp&&inp.value.trim()){obj['t'+idx]=inp.value.trim();obj['c'+idx]=!!(ck&&ck.classList.contains('done'));idx++;}
  });
  return obj;
}
async function save(silent){
  if(!sel||!editPerson)return;
  var p=editPerson;var obj=collectTasksFromDOM();var st=document.getElementById('st');
  if(!silent){st.className='status';st.textContent='저장 중…';}
  try{
    var existing=Object.assign({},monthData[sel]||{});
    if(Object.keys(obj).length===0)delete existing[p];else existing[p]=obj;
    if(Object.keys(existing).length===0)await db.ref('studyLogs/'+sel).remove();
    else await db.ref('studyLogs/'+sel).set(existing);
    if(!silent){st.textContent='✅ 저장!';st.className='status ok';}
  }catch(e){st.textContent='❌ '+e.message;st.className='status err';}
}
function _closePanel(){document.getElementById('panel').classList.remove('open');editPerson=null;}
async function closePanel(){await // removed auto-save_closePanel();}
function isPickerWeek(){return new Date().getDate()<=7;}
function getPrevMonthPre(){var today=new Date();var pm=new Date(today.getFullYear(),today.getMonth()-1,1);return pm.getFullYear()+'-'+pad(pm.getMonth()+1);}
async function loadPickerStats(){
  var pre=getPrevMonthPre();

  var el=document.getElementById('charGrid');el.innerHTML='';var takenBy={};PS.forEach(function(p){takenBy[picks[p]]=p;});
  Object.keys(CHARS).forEach(function(id){
    var div=document.createElement('div');var isMine=!!takenBy[id];div.className='copt view-only'+(isMine?' cpicked taken':'');
    div.innerHTML='<div style="width:46px;height:46px;margin:0 auto;position:relative">'+mkFw(id,46,isMine?1:0)+'</div><div class="cname">'+CHARS[id].name+'</div>';
    if(takenBy[id]){var tl=document.createElement('div');tl.className='taken-lbl';tl.textContent=PNAMES[takenBy[id]];div.appendChild(tl);}
    el.appendChild(div);
  });
}
function renderRankList(isOnboarding){
  var el=document.getElementById('rankList');el.innerHTML='';
  if(isOnboarding){el.innerHTML='<div style="font-size:.82rem;color:#6b7280;padding:8px 12px">시작전이라 랜킹은 동등! 원하는 캐릭터를 고르세요 😀</div>';return;}
  var ranks=getRanks(pickerStats);var medals=['🥇','🥈','🥉','🏅'];var cols=['#f59e0b','#94a3b8','#b45309','#6b7280'];
  ranks.forEach(function(r,i){var d=document.createElement('div');d.className='rrow';d.innerHTML='<div class="rnum" style="background:'+cols[i]+';color:#fff">'+medals[i]+'</div>'+mkSvg(picks[r.p],28)+'<div class="rinfo"><div class="rname">'+PNAMES[r.p]+'</div><div class="rscore">지난달 '+pickerStats[r.p].days+'일 &middot; 점수 '+r.score+'점</div></div>';el.appendChild(d);});
}
function renderPersonSel(){
  var ranks=getRanks(pickerStats);var el=document.getElementById('personSel');el.innerHTML='';
  ranks.forEach(function(r){
    var p=r.p;var btn=document.createElement('button');btn.className='pbtn';btn.innerHTML=mkSvg(picks[p],20)+' '+PNAMES[p];
    btn.onclick=function(){pperson=p;pselected=picks[p];document.querySelectorAll('.pbtn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderCharGrid();};
    el.appendChild(btn);
  });
}
function renderCharGrid(){
  var el=document.getElementById('charGrid');el.innerHTML='';var takenBy={};PS.forEach(function(p){takenBy[picks[p]]=p;});
  Object.keys(CHARS).forEach(function(id){
    var div=document.createElement('div');var takenOther=takenBy[id]&&takenBy[id]!==pperson;var isSelected=pselected===id;
    div.className='copt'+(isSelected?' cpicked':'')+(takenOther?' taken':'');
    div.innerHTML='<div style="width:46px;height:46px;margin:0 auto;position:relative">'+mkFw(id,46,isSelected?1:0)+'</div><div class="cname">'+CHARS[id].name+'</div>';
    if(takenOther){var tl=document.createElement('div');tl.className='taken-lbl';tl.textContent=PNAMES[takenBy[id]];div.appendChild(tl);}
    if(!takenOther){div.onclick=function(){if(!pperson){alert('먼저 내 이름을 선택해주세요!');return;}pselected=id;renderCharGrid();};}
    el.appendChild(div);
  });
}
async function confirmPick(){
  if(!pperson){alert('내 이름을 먼저 선택해주세요!');return;}
  if(!pselected){alert('캐릭터를 선택해주세요!');return;}
  var takenBy={};PS.forEach(function(p){if(p!==pperson)takenBy[picks[p]]=p;});
  if(takenBy[pselected]){alert(PNAMES[takenBy[pselected]]+'이 이미 선택한 캐릭터예요!');return;}
  var newPicks=Object.assign({},picks);newPicks[pperson]=pselected;newPicks.initialized=true;
  try{await db.ref('charPick').set(newPicks);closePicker();updatePickBtn();}catch(e){alert('저장 실패: '+e.message);}
}
function closePicker(){document.getElementById('modalBg').classList.remove('show');pperson=null;pselected=null;}
document.getElementById('prev').onclick=async function(){CM--;if(CM<0){CM=11;CY--;}await clearSel();listen(CY,CM);};
document.getElementById('next').onclick=async function(){CM++;if(CM>11){CM=0;CY++;}await clearSel();listen(CY,CM);};
document.getElementById('xbtn').onclick=clearSel;
document.getElementById('saveBtn').onclick=function(){save(false);};
document.getElementById('addTaskBtn').onclick=function(){
  if(!editPerson)return;var ch=CHARS[picks[editPerson]];var tl=document.getElementById('ptasks');tl.appendChild(makeTaskRow(null,ch.color));updateAddBtn();
};
document.getElementById('pickBtn').onclick=function(){db.ref('charPick/initialized').once('value',function(s){openPicker(!s.val());});};
document.getElementById('mCancel').onclick=closePicker;
document.getElementById('mConfirm').onclick=confirmPick;
document.getElementById('modalBg').onclick=function(e){if(e.target===document.getElementById('modalBg'))closePicker();};
(async function(){
  var today=new Date();var start=new Date(today);start.setDate(start.getDate()-89);
  var sk=kStr(start.getFullYear(),start.getMonth(),start.getDate());
  var ek=kStr(today.getFullYear(),today.getMonth(),today.getDate());
  var snap=await db.ref('studyLogs').orderByKey().startAt(sk).endAt(ek).once('value');
  snap.forEach(function(c){allData[c.key]=c.val();});
  calcStats();updatePickBtn();
})();
listen(CY,CM);
</script>
