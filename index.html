<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>📚 공부 캘린더 – 녕·준·숭</title>
<style>
:root{--bg:#f8f7ff;--card:#fff;--text:#1e1b4b;--muted:#9ca3af;--border:#e5e7eb;--r:16px;--sh:0 4px 20px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Apple SD Gothic Neo",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px 24px 16px;text-align:center}
header h1{font-size:1.6rem;font-weight:800}
header p{font-size:.85rem;opacity:.85;margin-top:4px}
.banner{display:flex;gap:12px;justify-content:center;padding:20px 16px 0;flex-wrap:wrap}
.cc{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--card);border-radius:var(--r);padding:12px 16px;box-shadow:var(--sh);border:3px solid var(--border);transition:all .3s;min-width:96px;position:relative;cursor:default}
.cc svg{width:60px;height:60px}
.cc .cn{font-size:.9rem;font-weight:800}
.cc.active{border-color:var(--cc);background:var(--ccl)}
.cc.inactive svg{filter:grayscale(70%) opacity(.45)}
.cc.inactive .cn{color:var(--muted)}
.stats-row{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.sb{display:inline-flex;align-items:center;gap:2px;font-size:.67rem;font-weight:700;padding:2px 6px;border-radius:20px;white-space:nowrap}
.sb-d{background:#ede9fe;color:#7e22ce}
.sb-s{background:#fef3c7;color:#b45309}
.rank-badge{position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:900;border:2px solid #fff;z-index:1}
.r1{background:#f59e0b;color:#fff}.r2{background:#94a3b8;color:#fff}.r3{background:#b45309;color:#fff}
.pick-btn{display:block;margin:14px auto 0;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;padding:9px 22px;font-size:.88rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.pick-btn:hover{opacity:.85}
.wrap{display:flex;gap:20px;padding:20px 20px 40px;max-width:1100px;margin:0 auto;align-items:flex-start}
.cal-wrap{flex:1;min-width:0}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-hdr h2{font-size:1.25rem;font-weight:800}
.nav-btn{background:var(--card);border:2px solid var(--border);border-radius:10px;width:38px;height:38px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nav-btn:hover{background:#ede9fe;border-color:#c084fc}
.cal-grid{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.wdays{display:grid;grid-template-columns:repeat(7,1fr);background:linear-gradient(135deg,#667eea,#764ba2)}
.wdays span{text-align:center;padding:10px 0;font-size:.78rem;font-weight:700;color:rgba(255,255,255,.9)}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.day{background:var(--card);min-height:72px;padding:8px 8px 6px;cursor:pointer;transition:background .15s}
.day:hover{background:#f5f3ff}.day.sel{background:#ede9fe}.day.om{background:#fafafa}.day.om .dn{color:var(--muted)}
.day.today .dn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.dn{font-size:.85rem;font-weight:700;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.day.sun .dn{color:#ef4444}.day.sat .dn{color:#3b82f6}
.day.today.sun .dn,.day.today.sat .dn{color:#fff}
.dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.dot{width:8px;height:8px;border-radius:50%}
.panel{width:340px;flex-shrink:0;background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:20px;display:none;position:sticky;top:20px}
.panel.open{display:block}
.p-hdr{font-size:1.1rem;font-weight:800;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.xbtn{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);line-height:1;padding:0 4px}
.xbtn:hover{color:var(--text)}
.entry{margin-bottom:14px}
.e-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.e-hdr svg{width:34px;height:34px}
.ename{font-size:.9rem;font-weight:800}
textarea{width:100%;min-height:70px;border:2px solid var(--border);border-radius:10px;padding:10px 12px;font-size:.87rem;font-family:inherit;resize:vertical;outline:none;transition:border-color .2s;background:#fafafa}
.btns{display:flex;gap:8px;margin-top:16px}
.b-save{flex:1;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;padding:12px;font-size:.92rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.b-save:hover{opacity:.88}
.b-del{background:#fee2e2;color:#dc2626;border:none;border-radius:10px;padding:12px 14px;font-size:.85rem;font-weight:700;cursor:pointer}
.b-del:hover{background:#fecaca}
.status{text-align:center;font-size:.8rem;margin-top:8px;min-height:18px;color:var(--muted)}
.status.ok{color:#059669}.status.err{color:#dc2626}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:20px;padding:22px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:1.15rem;font-weight:800;margin-bottom:2px}
.modal-sub{font-size:.8rem;color:var(--muted);margin-bottom:14px}
.rank-list{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;background:#f8f7ff;border-radius:12px;padding:10px}
.rrow{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:10px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.rnum{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:900;flex-shrink:0}
.rinfo{flex:1}
.rname{font-weight:800;font-size:.92rem}
.rscore{font-size:.72rem;color:var(--muted)}
.psec-label{font-size:.83rem;font-weight:700;margin-bottom:7px;color:#374151}
.person-sel{display:flex;gap:8px;margin-bottom:16px}
.pbtn{flex:1;padding:9px 6px;border:2px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;font-size:.85rem;font-weight:700;transition:all .2s;color:var(--text)}
.pbtn.active{border-color:#667eea;background:#ede9fe;color:#4338ca}
.char-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.copt{border:3px solid var(--border);border-radius:12px;padding:8px 5px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:#fafafa}
.copt:hover:not(.taken){transform:scale(1.06);border-color:#667eea;background:#f5f3ff}
.copt.cpicked{border-color:#667eea;background:#ede9fe;box-shadow:0 0 0 2px #667eea44}
.copt.taken{opacity:.45;cursor:not-allowed}
.copt svg{width:48px;height:48px}
.copt .cname{font-size:.68rem;font-weight:700;margin-top:3px}
.taken-lbl{position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:.58rem;font-weight:700;color:#6366f1}
.mfooter{display:flex;gap:8px;margin-top:14px}
.mbtn{flex:1;padding:11px;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer}
.mok{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.mno{background:#f3f4f6;color:var(--text)}
#ov{position:fixed;inset:0;background:rgba(255,255,255,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;font-size:1rem;font-weight:600;color:#667eea}
.sp{width:40px;height:40px;border:4px solid #e9d5ff;border-top-color:#667eea;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:700px){.wrap{flex-direction:column;padding:12px}.panel{width:100%;position:static}.banner{gap:8px}.cc{min-width:84px;padding:10px 12px}.cc svg{width:50px;height:50px}.char-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>

</div>

const todayK=()=>{const t=new Date();return kStr(t.getFullYear(),t.getMonth(),t.getDate());};

let Y=new Date().getFullYear(),M=new Date().getMonth(),sel=null,monthData={},allData={};
let picks={ny:'bunny',ju:'bear',su:'fox'};
let stats={ny:{days:0,streak:0},ju:{days:0,streak:0},su:{days:0,streak:0}};
let listenRef=null,listenCb=null;
let pperson=null,pselected=null;

function svg(id,sz){return '<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" width="'+sz+'" height="'+sz+'">'+CHARS[id].svg+'</svg>';}

// ---- Firebase picks ----
db.ref('charPick').on('value',s=>{const v=s.val();picks=Object.assign({ny:'bunny',ju:'bear',su:'fox'},v||{});renderBanner();if(sel)buildEntries();});

// ---- Stats ----
function calcStats(){
  const today=new Date(),curPre=today.getFullYear()+'-'+pad(today.getMonth()+1);
  const ns={ny:{days:0,streak:0},ju:{days:0,streak:0},su:{days:0,streak:0}};
  Object.entries(allData).forEach(([k,v])=>{if(k.startsWith(curPre)){PS.forEach(p=>{if(v[p]&&v[p].trim())ns[p].days++;});}});
  // merge current monthData if viewing current month
  if(Y===today.getFullYear()&&M===today.getMonth()){
    PS.forEach(p=>{let c=0;Object.entries(monthData).forEach(([k,v])=>{if(v[p]&&v[p].trim())c++;});ns[p].days=c;});
  }
  PS.forEach(p=>{
    let st=0,d=new Date(today);
    for(let i=0;i<90;i++){
      const k=kStr(d.getFullYear(),d.getMonth(),d.getDate());
      const merged=Object.assign({},allData[k]||{},monthData[k]||{});
      if(merged[p]&&merged[p].trim()){st++;d.setDate(d.getDate()-1);}else break;
    }
    ns[p].streak=st;
  });
  stats=ns;
  renderBanner();
}

function getRanks(){return PS.map(p=>({p,score:stats[p].days*2+stats[p].streak})).sort((a,b)=>b.score-a.score);}

// ---- Banner ----
function renderBanner(){
  const ranks=getRanks();const rankOf={};ranks.forEach((r,i)=>rankOf[r.p]=i+1);
  const bn=document.getElementById('banner');bn.innerHTML='';
  PS.forEach(p=>{
    const ch=CHARS[picks[p]],rank=rankOf[p],s=stats[p];
    const d=document.createElement('div');
    d.className='cc inactive';d.id='c-'+p;
    d.style.cssText='--cc:'+ch.color+';--ccl:'+ch.light;
    const medals=['&#x1F451;','&#x1F948;','&#x1F949;'];
    d.innerHTML='<div class="rank-badge '+(rank===1?'r1':rank===2?'r2':'r3')+'">'+medals[rank-1]+'</div>'+
      svg(picks[p],60)+
      '<span class="cn" style="color:'+ch.dark+'">'+PNAMES[p]+'</span>'+
      '<div class="stats-row">'+
        '<span class="sb sb-d">📅'+s.days+'일</span>'+
        (s.streak>0?'<span class="sb sb-s">🔥'+s.streak+'일</span>':'')+
      '</div>';
    bn.appendChild(d);
  });
}

// ---- Calendar ----
function listen(y,m){
  if(listenRef&&listenCb){listenRef.off('value',listenCb);listenRef=null;listenCb=null;}
  const pre=y+'-'+pad(m+1);
  listenRef=db.ref('studyLogs').orderByKey().startAt(pre+'-01').endAt(pre+'-31');
  listenCb=listenRef.on('value',s=>{
    monthData={};s.forEach(c=>{monthData[c.key]=c.val();});
    render();if(sel)refresh();
    document.getElementById('ov').style.display='none';
    calcStats();
  },e=>{console.error(e);document.getElementById('ov').style.display='none';});
}

function render(){
  document.getElementById('mlabel').textContent=Y+'년 '+(M+1)+'월';
  const c=document.getElementById('days');c.innerHTML='';
  const fd=new Date(Y,M,1).getDay(),dim=new Date(Y,M+1,0).getDate(),dip=new Date(Y,M,0).getDate();
  for(let i=0;i<fd;i++)c.appendChild(cell(Y,M-1,dip-fd+1+i,true));
  for(let d=1;d<=dim;d++)c.appendChild(cell(Y,M,d,false));
  const tr=(fd+dim)%7===0?0:7-(fd+dim)%7;
  for(let d=1;d<=tr;d++)c.appendChild(cell(Y,M+1,d,true));
}

function cell(y,m,d,om){
  const k=kStr(y,m,d),div=document.createElement('div');
  const dow=new Date(y,m,d).getDay();
  div.className='day'+(dow===0?' sun':dow===6?' sat':'')+(om?' om':'')+(k===todayK()?' today':'')+(k===sel?' sel':'');
  const dn=document.createElement('div');dn.className='dn';dn.textContent=d;div.appendChild(dn);
  const v=monthData[k];
  if(v){const dr=document.createElement('div');dr.className='dots';
    PS.forEach(p=>{if(v[p]&&v[p].trim()){const dot=document.createElement('div');dot.className='dot';dot.style.background=CHARS[picks[p]].color;dr.appendChild(dot);}});
    if(dr.children.length)div.appendChild(dr);}
  div.onclick=()=>{sel=k;openPanel(k);render();};
  return div;
}

// ---- Panel ----
function openPanel(k){
  document.getElementById('panel').classList.add('open');
  const[y,m,d]=k.split('-');
  const w=['일','월','화','수','목','금','토'];
  document.getElementById('ptitle').textContent=y+'년 '+(+m)+'월 '+(+d)+'일 ('+w[new Date(+y,+m-1,+d).getDay()]+')';
  buildEntries();refresh();
}

function buildEntries(){
  const el=document.getElementById('entries');el.innerHTML='';
  PS.forEach(p=>{
    const ch=CHARS[picks[p]];
    const d=document.createElement('div');d.className='entry';
    d.innerHTML='<div class="e-hdr">'+svg(picks[p],34)+'<span class="ename" style="color:'+ch.dark+'">'+PNAMES[p]+'의 공부</span></div>';
    const ta=document.createElement('textarea');ta.id='ta-'+p;
    ta.placeholder=PNAMES[p]+'이 오늘 공부한 내용을 입력하세요…';
    ta.style.borderColor=ch.color;
    ta.addEventListener('focus',()=>{ta.style.background=ch.light;});
    ta.addEventListener('blur',()=>{ta.style.background='#fafafa';});
    d.appendChild(ta);el.appendChild(d);
  });
}

function refresh(){
  if(!sel)return;
  const v=monthData[sel]||{};
  PS.forEach(p=>{const ta=document.getElementById('ta-'+p);if(ta)ta.value=v[p]||'';});
  PS.forEach(p=>{
    const el=document.getElementById('c-'+p);if(!el)return;
    const ch=CHARS[picks[p]];
    if(v[p]&&v[p].trim()){el.classList.remove('inactive');el.classList.add('active');}
    else{el.classList.remove('active');el.classList.add('inactive');}
  });
  document.getElementById('st').textContent='';document.getElementById('st').className='status';
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');sel=null;render();
  PS.forEach(p=>{const el=document.getElementById('c-'+p);if(el){el.classList.remove('active');el.classList.add('inactive');}});
}

async function save(){
  if(!sel)return;
  const vals={};PS.forEach(p=>{vals[p]=(document.getElementById('ta-'+p)||{}).value?.trim()||'';});
  const st=document.getElementById('st');st.className='status';st.textContent='저장 중…';
  try{
    if(PS.every(p=>!vals[p]))await db.ref('studyLogs/'+sel).remove();
    else await db.ref('studyLogs/'+sel).set(vals);
    st.textContent='✅ 저장되었어요!';st.className='status ok';
  }catch(e){st.textContent='❌ 오류: '+e.message;st.className='status err';}
}

async function del(){
  if(!sel||!confirm('이 날의 기록을 모두 삭제할까요?'))return;
  const st=document.getElementById('st');st.className='status';st.textContent='삭제 중…';
  try{
    await db.ref('studyLogs/'+sel).remove();
    PS.forEach(p=>{const ta=document.getElementById('ta-'+p);if(ta)ta.value='';});
    st.textContent='🗑 삭제되었어요!';st.className='status ok';
  }catch(e){st.textContent='❌ 실패: '+e.message;st.className='status err';}
}

// ---- Character Picker ----
function openPicker(){
  pperson=null;pselected=null;
  renderRankList();renderPersonSel();renderCharGrid();
  document.getElementById('modalBg').classList.add('show');
}

function renderRankList(){
  const ranks=getRanks();const medals=['🥇','🥈','🥉'];
  const cols=['#f59e0b','#94a3b8','#b45309'];
  const el=document.getElementById('rankList');el.innerHTML='';
  ranks.forEach((r,i)=>{
    const p=r.p,s=stats[p],ch=CHARS[picks[p]];
    const d=document.createElement('div');d.className='rrow';
    d.innerHTML='<div class="rnum" style="background:'+cols[i]+';color:#fff">'+medals[i]+'</div>'+
      svg(picks[p],30)+
      '<div class="rinfo"><div class="rname">'+PNAMES[p]+'</div>'+
      '<div class="rscore">이번달 '+s.days+'일 &middot; 연속 '+s.streak+'일 &middot; 점수 '+r.score+'점</div></div>';
    el.appendChild(d);
  });
}

function renderPersonSel(){
  const ranks=getRanks();const el=document.getElementById('personSel');el.innerHTML='';
  ranks.forEach(r=>{
    const p=r.p;const btn=document.createElement('button');btn.className='pbtn';
    btn.textContent=PNAMES[p];
    btn.onclick=()=>{pperson=p;pselected=picks[p];document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderCharGrid();};
    el.appendChild(btn);
  });
}

function renderCharGrid(){
  const el=document.getElementById('charGrid');el.innerHTML='';
  const takenBy={};PS.forEach(p=>{takenBy[picks[p]]=p;});
  Object.entries(CHARS).forEach(([id,ch])=>{
    const div=document.createElement('div');
    const takenOther=takenBy[id]&&takenBy[id]!==pperson;
    const isSelected=pselected===id;
    div.className='copt'+(isSelected?' cpicked':'')+(takenOther?' taken':'');
    div.innerHTML=svg(id,48)+'<div class="cname">'+ch.name+'</div>';
    if(takenOther){const tl=document.createElement('div');tl.className='taken-lbl';tl.textContent=PNAMES[takenBy[id]];div.appendChild(tl);}
    if(!takenOther){div.onclick=()=>{if(!pperson){alert('먼저 내 이름을 선택해주세요!');return;}pselected=id;renderCharGrid();};}
    el.appendChild(div);
  });
}

async function confirmPick(){
  if(!pperson){alert('내 이름을 먼저 선택해주세요!');return;}
  if(!pselected){alert('캐릭터를 선택해주세요!');return;}
  const takenBy={};PS.forEach(p=>{if(p!==pperson)takenBy[picks[p]]=p;});
  if(takenBy[pselected]){alert(PNAMES[takenBy[pselected]]+'이 이미 선택한 캐릭터예요!');return;}
  const newPicks=Object.assign({},picks);newPicks[pperson]=pselected;
  try{await db.ref('charPick').set(newPicks);closePicker();}
  catch(e){alert('저장 실패: '+e.message);}
}

function closePicker(){document.getElementById('modalBg').classList.remove('show');pperson=null;pselected=null;}

// ---- Events ----
document.getElementById('prev').onclick=()=>{M--;if(M<0){M=11;Y--;}sel=null;document.getElementById('panel').classList.remove('open');listen(Y,M);};
document.getElementById('next').onclick=()=>{M++;if(M>11){M=0;Y++;}sel=null;document.getElementById('panel').classList.remove('open');listen(Y,M);};
document.getElementById('xbtn').onclick=closePanel;
document.getElementById('bsave').onclick=save;
document.getElementById('bdel').onclick=del;
document.getElementById('pickBtn').onclick=openPicker;
document.getElementById('mCancel').onclick=closePicker;
document.getElementById('mConfirm').onclick=confirmPick;
document.getElementById('modalBg').onclick=e=>{if(e.target===document.getElementById('modalBg'))closePicker();};

// ---- Init ----
(async()=>{
  const today=new Date();
  const start=new Date(today);start.setDate(start.getDate()-89);
  const sk=kStr(start.getFullYear(),start.getMonth(),start.getDate());
  const ek=kStr(today.getFullYear(),today.getMonth(),today.getDate());
  const snap=await db.ref('studyLogs').orderByKey().startAt(sk).endAt(ek).once('value');
  snap.forEach(c=>{allData[c.key]=c.val();});
  calcStats();
})();
listen(Y,M);
</script>
</body>
</html>
