<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>📚 공부 캘린더 – 녕·준·숭·뽀</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#667eea"/>
<link rel="apple-touch-icon" href="icon-180.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="studyLog"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
:root{--bg:#f8f7ff;--card:#fff;--text:#1e1b4b;--muted:#9ca3af;--border:#e5e7eb;--r:16px;--sh:0 4px 20px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Apple SD Gothic Neo",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:18px 24px 14px;text-align:center;position:relative}
header h1{font-size:1.5rem;font-weight:800}
.logo-title{font-family:'Pacifico',cursive!important;font-size:1.9rem!important;font-weight:400!important;letter-spacing:1px}
header p{font-size:.82rem;opacity:.85;margin-top:3px}
.banner{display:flex;gap:10px;justify-content:center;padding:18px 12px 0;flex-wrap:wrap}
.cc{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--card);border-radius:var(--r);padding:11px 14px;box-shadow:var(--sh);border:3px solid rgba(150,150,150,0.18);transition:border-color .4s,box-shadow .25s,transform .25s;min-width:88px;position:relative;cursor:pointer;user-select:none}
.cc:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.fw{position:relative;flex-shrink:0}
.fw svg{position:absolute;top:0;left:0}
.fw .grey{filter:grayscale(1) opacity(.35)}
.fw .fclip{position:absolute;bottom:0;left:0;overflow:hidden;transition:clip-path 0.45s cubic-bezier(0.34,1.56,0.64,1)}
.fw .fclip svg{position:absolute;bottom:0;left:0}
.cn{font-size:.88rem;font-weight:800;color:var(--ccd)}
.stats-row{display:flex;gap:3px;flex-wrap:wrap;justify-content:center}
.sb{display:inline-flex;align-items:center;gap:2px;font-size:.64rem;font-weight:700;padding:2px 5px;border-radius:20px;white-space:nowrap}
.sb-d{background:#ede9fe;color:#7e22ce}.sb-s{background:#fef3c7;color:#b45309}
.rank-badge{position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:900;border:2px solid #fff}
.r1{background:#f59e0b;color:#fff}.r2{background:#94a3b8;color:#fff}.r3{background:#b45309;color:#fff}.r4{background:#6b7280;color:#fff}
.sel-strip{display:none;align-items:center;justify-content:center;gap:10px;margin:10px 16px 0;padding:8px 16px;background:#ede9fe;border-radius:10px;font-size:.82rem;font-weight:700;color:#4338ca}
.sel-strip.show{display:flex}
.sel-strip-hint{font-size:.72rem;color:#7c3aed;font-weight:500}
.sel-clear{background:none;border:none;font-size:1.1rem;cursor:pointer;color:#7c3aed;line-height:1;margin-left:auto}
.panel{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:18px;display:none;margin:10px 16px 0;max-width:600px}
@media(min-width:600px){.panel{margin-left:auto;margin-right:auto}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.panel.open{display:block;animation:slideDown .18s ease}
.p-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:11px;border-bottom:2px solid var(--border)}
.p-hdr-left{display:flex;flex-direction:column;gap:2px}
.p-date{font-size:.72rem;color:var(--muted);font-weight:600}
.p-person{display:flex;align-items:center;gap:7px;font-size:.95rem;font-weight:800}
.xbtn{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);line-height:1;padding:0 4px;flex-shrink:0}
.xbtn:hover{color:var(--text)}
.task-list{display:flex;flex-direction:column;gap:6px}
.task-row{display:flex;align-items:center;gap:6px}
.task-input{flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:.84rem;font-family:inherit;outline:none;background:#fafafa;transition:border-color .2s}
.task-input:focus{background:#fff}
.ck-btn{width:28px;height:28px;border-radius:8px;border:2px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;transition:all .2s;color:transparent}
.ck-btn.done{color:#fff;border-color:var(--ccc,#667eea);background:var(--ccc,#667eea)}
.task-del{width:24px;height:24px;border-radius:7px;border:none;background:#fee2e2;color:#dc2626;cursor:pointer;font-size:.9rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .2s}
.task-del:hover{background:#fca5a5}
.add-task-btn{font-size:.75rem;color:var(--muted);background:none;border:1.5px dashed var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;width:100%;transition:all .2s;margin-top:4px}
.add-task-btn:hover{border-color:#667eea;color:#667eea}
.save-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;padding:9px 0;font-size:.88rem;font-weight:700;cursor:pointer;width:100%;margin-top:10px;transition:opacity .2s}
.save-btn:hover{opacity:.88}
.status{text-align:center;font-size:.78rem;margin-top:7px;min-height:17px;color:var(--muted)}
.status.ok{color:#059669}.status.err{color:#dc2626}
.task-item{display:flex;flex-direction:column;gap:5px}
.task-time{display:flex;flex-direction:column;gap:6px;padding-left:2px}
.time-chip{align-self:flex-start;font-size:.72rem;font-weight:700;border:1.5px solid var(--border);background:#fff;color:var(--muted);border-radius:20px;padding:3px 11px;cursor:pointer;transition:all .15s}
.time-chip:hover{border-color:#c084fc}
.time-chip.has{color:#fff;border-color:var(--ccc,#667eea);background:var(--ccc,#667eea)}
.time-pop{display:none;background:#faf9ff;border:1.5px solid var(--border);border-radius:12px;padding:10px;margin-top:2px}
.time-pop.show{display:block;animation:slideDown .15s ease}
.tp-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tp-row select{padding:6px 8px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.82rem;background:#fff;cursor:pointer;outline:none}
.tp-u{font-size:.78rem;color:var(--muted);font-weight:600;margin-right:4px}
.tp-quick{display:flex;gap:5px;flex-wrap:wrap}
.tp-quick button{font-size:.72rem;font-weight:700;border:1.5px solid var(--border);background:#fff;border-radius:8px;padding:5px 9px;cursor:pointer;color:#4338ca;transition:all .15s}
.tp-quick button:hover{border-color:#667eea;background:#ede9fe}
.tp-quick .tp-clear{color:#dc2626}
.tp-quick .tp-clear:hover{border-color:#fca5a5;background:#fee2e2}
.pe-total{text-align:right;font-size:.82rem;color:var(--text);margin-top:10px;min-height:18px}
.pe-total b{color:#7c3aed}
.day.hol .dn{color:#ef4444}
.day.sat.hol .dn,.day.sun.hol .dn{color:#ef4444}
.day.today.hol .dn{color:#fff}
.hol-name{font-size:.56rem;line-height:1.15;color:#ef4444;font-weight:700;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.pick-area{text-align:center;margin:10px 0 0}
.pick-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;padding:8px 20px;font-size:.85rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.pick-btn:disabled{background:#d1d5db;color:#9ca3af;cursor:not-allowed}
.pick-note{font-size:.72rem;color:var(--muted);margin-top:4px}
.wrap{padding:18px 18px 40px;max-width:700px;margin:0 auto}
.cal-wrap{width:100%}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-hdr h2{font-size:1.2rem;font-weight:800}
.nav-btn{background:var(--card);border:2px solid var(--border);border-radius:10px;width:36px;height:36px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nav-btn:hover{background:#ede9fe;border-color:#c084fc}
.cal-grid{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.wdays{display:grid;grid-template-columns:repeat(7,1fr);background:linear-gradient(135deg,#667eea,#764ba2)}
.wdays span{text-align:center;padding:9px 0;font-size:.75rem;font-weight:700;color:rgba(255,255,255,.9)}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.day{background:var(--card);min-height:70px;padding:7px 7px 5px;cursor:pointer;transition:background .15s}
.day:hover{background:#f5f3ff}.day.sel{background:#ede9fe}.day.om{background:#fafafa}.day.om .dn{color:var(--muted)}
.day.today .dn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.dn{font-size:.82rem;font-weight:700;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.day.sun .dn{color:#ef4444}.day.sat .dn{color:#3b82f6}
.day.today.sun .dn,.day.today.sat .dn{color:#fff}
.dots{display:flex;gap:2px;flex-wrap:wrap;margin-top:3px}
.dot{width:7px;height:7px;border-radius:50%}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:center;justify-content:center;padding:14px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:20px;padding:22px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:1.1rem;font-weight:800;margin-bottom:2px}
.modal-sub{font-size:.78rem;color:var(--muted);margin-bottom:14px}
.rank-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;background:#f8f7ff;border-radius:12px;padding:10px}
.rrow{display:flex;align-items:center;gap:9px;padding:6px 9px;border-radius:9px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.rnum{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:900;flex-shrink:0}
.rinfo{flex:1}.rname{font-weight:800;font-size:.88rem}.rscore{font-size:.7rem;color:var(--muted)}
.psec-label{font-size:.82rem;font-weight:700;margin-bottom:6px;color:#374151}
.person-sel{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.pbtn{flex:1;min-width:60px;padding:8px 4px;border:2px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;font-size:.83rem;font-weight:700;transition:all .2s;color:var(--text);white-space:nowrap}
.pbtn.active{border-color:#667eea;background:#ede9fe;color:#4338ca}
.char-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:0}
.copt{border:3px solid var(--border);border-radius:12px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:#fafafa}
.copt:hover:not(.taken):not(.view-only){transform:scale(1.05);border-color:#667eea;background:#f5f3ff}
.copt.cpicked{border-color:#667eea;background:#ede9fe;box-shadow:0 0 0 2px #667eea44}
.copt.taken{opacity:.42;cursor:not-allowed}
.copt.view-only{cursor:default}
.copt .cname{font-size:.65rem;font-weight:700;margin-top:3px;color:var(--text)}
.taken-lbl{position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:.56rem;font-weight:700;color:#6366f1}
.mfooter{display:flex;gap:8px;margin-top:14px}
.mbtn{flex:1;padding:10px;border:none;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer}
.mok{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.mno{background:#f3f4f6;color:var(--text)}
.view-info-box{background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:.82rem;color:#0369a1;line-height:1.7}
#ov{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;font-size:1rem;font-weight:600;color:#667eea}
.sp{width:38px;height:38px;border:4px solid #e9d5ff;border-top-color:#667eea;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:800px){
  .wrap{padding:8px 4px 40px}
  .banner{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:12px 4px 0}
  .cc{min-width:0;padding:8px 3px}
  .cc .cn{font-size:.76rem}
  .cc .sb{font-size:.58rem;padding:1px 4px}
  .sel-strip{margin:8px 4px 0;font-size:.76rem;gap:6px}
  .sel-strip-hint{display:none}
  .panel{margin:8px 4px 0}
  .pick-area{margin:8px 4px 0}
  .cal-wrap{width:100%}
  .day{min-height:52px;padding:5px 3px 3px}
  .dn{font-size:.75rem}
  .dots{gap:2px}
  .dot{width:6px;height:6px}
  .char-grid{grid-template-columns:repeat(4,1fr)}
}
.status-badge{display:inline-flex;align-items:center;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:10px;margin-top:2px;white-space:nowrap}
.sb-done{background:#dcfce7;color:#166534}.sb-part{background:#fef9c3;color:#854d0e}.sb-plan{background:#dbeafe;color:#1e40af}
.stats-btn{background:none;border:1.5px solid var(--border);border-radius:10px;padding:6px 14px;font-size:.78rem;font-weight:700;cursor:pointer;color:var(--text);transition:all .2s;margin-left:8px}
.stats-btn:hover{border-color:#667eea;color:#667eea}
.stats-table{width:100%;border-collapse:collapse;font-size:.8rem;margin:8px 0}
.stats-table th,.stats-table td{padding:6px 8px;text-align:center;border-bottom:1px solid var(--border)}
.stats-table th{font-weight:700;color:var(--muted);font-size:.72rem}.stats-table td:first-child{text-align:left;font-weight:700}
.ms-item{padding:6px 0;border-bottom:1px solid var(--border);font-size:.78rem}
.ms-head{display:flex;align-items:center;gap:5px;font-weight:700}
.ms-tasks{margin-top:3px;color:var(--muted);font-size:.72rem;padding-left:18px}
.ms-person{margin:12px 0 4px;font-weight:800;font-size:.85rem;display:flex;align-items:center;gap:6px}
.notif-wrap{position:relative;z-index:300}
.notif-btn{background:rgba(255,255,255,.18);border:none;font-size:1.1rem;cursor:pointer;width:38px;height:38px;border-radius:50%;position:relative;color:#fff;line-height:1}
.notif-btn:hover{background:rgba(255,255,255,.3)}
.notif-badge{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:.62rem;font-weight:800;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid #fff}
.notif-panel{display:none;position:absolute;right:0;top:46px;width:300px;max-height:380px;overflow-y:auto;background:#fff;border-radius:18px;box-shadow:0 12px 36px rgba(30,27,75,.18);padding:8px;text-align:left;color:var(--text);font-family:'Pretendard',"Segoe UI","Apple SD Gothic Neo",sans-serif}
.notif-panel.show{display:block;animation:slideDown .18s ease}
.notif-hdr{display:flex;align-items:baseline;gap:6px;padding:8px 12px 7px;border-bottom:1px solid var(--border);margin-bottom:4px}
.notif-hdr-title{font-size:.88rem;font-weight:800;letter-spacing:-.01em}
.notif-hdr-sub{font-size:.66rem;color:var(--muted);font-weight:500}
.notif-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:12px;transition:background .15s}
.notif-item:hover{background:#faf9ff}
.notif-item.unread{background:#f5f3ff}
.notif-item.unread:hover{background:#ede9fe}
.notif-ava{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid transparent}
.notif-body{flex:1;min-width:0}
.notif-msg{font-size:.8rem;font-weight:500;letter-spacing:-.015em;line-height:1.45;color:#3f3d56}
.notif-msg b{font-weight:800}
.notif-time{font-size:.66rem;color:var(--muted);margin-top:2px;font-weight:500}
.notif-dot{width:7px;height:7px;border-radius:50%;background:#7c6cf0;flex-shrink:0;opacity:0}
.notif-item.unread .notif-dot{opacity:1}
.notif-empty{padding:26px 18px;text-align:center;color:var(--muted);font-size:.78rem;letter-spacing:-.01em}
.hdr-actions{position:absolute;top:14px;right:14px;display:flex;gap:8px;z-index:300}
.hdr-btn{background:rgba(255,255,255,.18);border:none;font-size:1.05rem;cursor:pointer;width:38px;height:38px;border-radius:50%;color:#fff;line-height:1;display:flex;align-items:center;justify-content:center;transition:background .2s}
.hdr-btn:hover{background:rgba(255,255,255,.32)}
.me-badge{position:absolute;top:-9px;left:-8px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:.56rem;font-weight:900;padding:2px 7px;border-radius:10px;border:2px solid #fff;z-index:3}
.set-sec{margin:14px 0;padding:14px 16px;background:#f8f7ff;border-radius:16px}
.set-label{font-size:.85rem;font-weight:800;color:#374151;margin-bottom:10px}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.set-sub{font-size:.72rem;color:var(--muted);font-weight:500;margin-top:3px;line-height:1.4}
.set-hint{font-size:.7rem;color:var(--muted);margin-top:10px;line-height:1.55}
.person-pick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.pp-item{border:2.5px solid var(--border);border-radius:16px;padding:10px 4px 8px;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .15s}
.pp-item:hover{border-color:#c084fc;transform:translateY(-2px)}
.pp-item.sel{border-color:#667eea;background:#ede9fe;box-shadow:0 0 0 3px #667eea22}
.pp-name{font-size:.8rem;font-weight:800;color:var(--text)}
.toggle{width:48px;height:28px;border-radius:14px;background:#d1d5db;border:none;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;padding:0}
.toggle.on{background:#667eea}
.toggle:disabled{opacity:.5;cursor:not-allowed}
.toggle .knob{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.toggle.on .knob{left:23px}
.onb-emoji{font-size:2.4rem;line-height:1;margin-bottom:6px}
@media(max-width:800px){
  body{display:flex;flex-direction:column;min-height:100dvh}
  .wrap{flex:1;display:flex;flex-direction:column;padding-bottom:10px}
  .cal-wrap{flex:1;display:flex;flex-direction:column}
  .cal-grid{flex:1;display:flex;flex-direction:column;min-height:0}
  .days{flex:1;grid-auto-rows:minmax(52px,1fr);min-height:0}
}
</style>
</head>
<body>
<div id="ov"><div class="sp"></div><span>연결 중…</span></div>
<header>
  <h1 class="logo-title">studyLog</h1>
  <p>녕 · 준 · 숭 · 뽀</p>
  <div class="hdr-actions">
    <button class="hdr-btn" id="settingsBtn" title="설정">⚙️</button>
    <div class="notif-wrap" id="notifWrap">
      <button class="notif-btn" id="notifBtn">🔔<span class="notif-badge" id="notifBadge" style="display:none"></span></button>
      <div class="notif-panel" id="notifPanel"></div>
    </div>
  </div>
</header>
<div class="banner" id="banner"></div>
<div class="panel" id="panel">
  <div class="p-hdr">
    <div class="p-hdr-left">
      <span class="p-date" id="pdate"></span>
      <div class="p-person" id="pperson"></div>
    </div>
    <button class="xbtn" id="xbtn">&times;</button>
  </div>
  <div class="task-list" id="ptasks"></div>
  <button class="add-task-btn" id="addTaskBtn" style="display:none">+ 추가</button>
  <div class="pe-total" id="peTotal"></div>
  <button class="save-btn" id="saveBtn">💾 저장</button>
  <div class="status" id="st"></div>
</div>
<div class="pick-area">
  <button class="pick-btn" id="pickBtn">🎭 캐릭터 고르기</button>
  <button class="stats-btn" id="statBtn" onclick="showStats()">📊 통계</button>
  <button class="stats-btn" id="summaryBtn" onclick="openMonthSummary()">📅 이번달 요약</button>
  <div class="pick-note" id="pickNote"></div>
</div>

function getFill(pData){
  if(!pData)return 0;

  return total===0?0:done/total;

function getDayStatus(pData){
  if(!pData)return 'none';

  if(!tasks.length)return 'none';

  return done===tasks.length?'done':'partial';

var NOTIF_TYPES={plan:'계획 수립',partial:'일부 달성',done:'계획 달성'};
var notifs=[];
var notifLastRead=+(localStorage.getItem('notifLastRead')||0);
function maybeNotify(p,dateK,prev,next){
  if(prev===next)return;
  var type=null;
  if(next==='done')type='done';
  else if(next==='partial'&&(prev==='none'||prev==='plan'))type='partial';
  else if(next==='plan'&&prev==='none')type='plan';
  if(!type)return;
  try{db.ref('notifications').push({ts:Date.now(),p:p,date:dateK,type:type});}catch(e){console.error(e);}
}
function relTime(ts){
  var diff=Date.now()-ts;if(diff<0)diff=0;
  var m=Math.floor(diff/60000);
  if(m<1)return '방금 전';
  if(m<60)return m+'분 전';
  var h=Math.floor(m/60),rm=m%60;
  if(h<24)return h+'시간 '+(rm?rm+'분 ':'')+'전';
  return Math.floor(h/24)+'일 전';
}
var NOTIF_STYLE={
  plan:{tpl:'{day} 공부 계획을 세웠어요 ✏️'},
  partial:{tpl:'{day} 계획을 한 걸음 달성했어요 🔥'},
  done:{tpl:'{day} 계획을 모두 달성했어요 🎉'}
};
function josa(name){
  var c=name.charCodeAt(name.length-1);
  if(c<0xAC00||c>0xD7A3)return '이';
  return (c-0xAC00)%28>0?'이':'가';
}
function notifMsg(n){
  if(!n.p||!n.date||!NOTIF_STYLE[n.type]||!PNAMES[n.p])return null;
  var t=new Date();var curPre=t.getFullYear()+'-'+pad(t.getMonth()+1);
  var day=parseInt(n.date.slice(8),10);
  var dayLabel=n.date.indexOf(curPre)===0?day+'일':parseInt(n.date.slice(5,7),10)+'월 '+day+'일';
  var nm=PNAMES[n.p];var ch=CHARS[picks[n.p]]||{dark:'#4338ca'};
  return '<b style="color:'+ch.dark+'">'+nm+'</b>'+josa(nm)+' '+NOTIF_STYLE[n.type].tpl.replace('{day}','<b>'+dayLabel+'</b>');
}
function renderNotifs(){
  var badge=document.getElementById('notifBadge');
  var panel=document.getElementById('notifPanel');
  if(!badge||!panel)return;
  var unread=notifs.filter(function(n){return n.ts>notifLastRead;}).length;
  if(unread>0){badge.style.display='flex';badge.textContent=unread>99?'99+':unread;}
  else badge.style.display='none';
  var hdr='<div class="notif-hdr"><span class="notif-hdr-title">🔔 알림</span><span class="notif-hdr-sub">우리들의 공부 소식</span></div>';
  var empty='<div class="notif-empty">아직 새로운 소식이 없어요 🌙<br>오늘의 계획을 세워볼까요?</div>';
  if(!notifs.length){panel.innerHTML=hdr+empty;return;}
  var html='';
  notifs.forEach(function(n){
    var msg=notifMsg(n);if(!msg)return;
    var ch=CHARS[picks[n.p]];
    var ava=ch?'<div class="notif-ava" style="background:'+ch.light+';border-color:'+ch.color+'55">'+mkSvg(picks[n.p],24)+'</div>':'<div class="notif-ava">🔔</div>';
    html+='<div class="notif-item'+(n.ts>notifLastRead?' unread':'')+'">'+ava+'<div class="notif-body"><div class="notif-msg">'+msg+'</div><div class="notif-time">'+relTime(n.ts)+'</div></div><div class="notif-dot"></div></div>';
  });
  panel.innerHTML=hdr+(html||empty);
}
