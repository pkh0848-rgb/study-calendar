<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>📚 공부 캘린더 – 녕·준·숭·뽀</title>
<style>
:root{--bg:#f8f7ff;--card:#fff;--text:#1e1b4b;--muted:#9ca3af;--border:#e5e7eb;--r:16px;--sh:0 4px 20px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Apple SD Gothic Neo",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:18px 24px 14px;text-align:center}
header h1{font-size:1.5rem;font-weight:800}
header p{font-size:.82rem;opacity:.85;margin-top:3px}
.banner{display:flex;gap:10px;justify-content:center;padding:18px 12px 0;flex-wrap:wrap}
.cc{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--card);border-radius:var(--r);padding:11px 14px;box-shadow:var(--sh);border:3px solid var(--border);transition:border-color .3s,background .3s;min-width:88px;position:relative}
.cc.active{border-color:var(--cc);background:var(--ccl)}
.fw{position:relative;width:58px;height:58px;flex-shrink:0}
.fw svg{position:absolute;top:0;left:0;width:58px;height:58px}
.fw .grey{filter:grayscale(1) opacity(.38)}
.fw .fclip{position:absolute;bottom:0;left:0;width:58px;overflow:hidden;transition:height .5s ease}
.fw .fclip svg{position:absolute;bottom:0;left:0}
.cn{font-size:.88rem;font-weight:800;color:var(--ccd)}
.stats-row{display:flex;gap:3px;flex-wrap:wrap;justify-content:center}
.sb{display:inline-flex;align-items:center;gap:2px;font-size:.64rem;font-weight:700;padding:2px 5px;border-radius:20px;white-space:nowrap}
.sb-d{background:#ede9fe;color:#7e22ce}.sb-s{background:#fef3c7;color:#b45309}
.rank-badge{position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:900;border:2px solid #fff}
.r1{background:#f59e0b;color:#fff}.r2{background:#94a3b8;color:#fff}.r3{background:#b45309;color:#fff}.r4{background:#6b7280;color:#fff}
.pick-area{text-align:center;margin:12px 0 0}
.pick-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;padding:8px 20px;font-size:.85rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.pick-btn:disabled{background:#d1d5db;color:#9ca3af;cursor:not-allowed}
.pick-note{font-size:.72rem;color:var(--muted);margin-top:5px}
.wrap{display:flex;gap:18px;padding:18px 18px 40px;max-width:1200px;margin:0 auto;align-items:flex-start}
.cal-wrap{flex:1;min-width:0}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-hdr h2{font-size:1.2rem;font-weight:800}
.nav-btn{background:var(--card);border:2px solid var(--border);border-radius:10px;width:36px;height:36px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nav-btn:hover{background:#ede9fe;border-color:#c084fc}
.cal-grid{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.wdays{display:grid;grid-template-columns:repeat(7,1fr);background:linear-gradient(135deg,#667eea,#764ba2)}
.wdays span{text-align:center;padding:9px 0;font-size:.75rem;font-weight:700;color:rgba(255,255,255,.9)}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.day{background:var(--card);min-height:70px;padding:7px 7px 5px;cursor:pointer;transition:background .15s}
.day:hover{background:#f5f3ff}.day.sel{background:#ede9fe}.day.om{background:#fafafa}.day.om .dn{color:var(--muted)}
.day.today .dn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.dn{font-size:.82rem;font-weight:700;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.day.sun .dn{color:#ef4444}.day.sat .dn{color:#3b82f6}
.day.today.sun .dn,.day.today.sat .dn{color:#fff}
.dots{display:flex;gap:2px;flex-wrap:wrap;margin-top:3px}
.dot{width:7px;height:7px;border-radius:50%}
.panel{width:360px;flex-shrink:0;background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:18px;display:none;position:sticky;top:18px}
.panel.open{display:block}
.p-hdr{font-size:1.05rem;font-weight:800;margin-bottom:14px;padding-bottom:11px;border-bottom:2px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.xbtn{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);line-height:1;padding:0 4px}
.xbtn:hover{color:var(--text)}
.entry{margin-bottom:14px}
.e-hdr{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.e-hdr .fw{width:32px;height:32px;flex-shrink:0}
.e-hdr .fw svg{width:32px;height:32px}
.e-hdr .fw .fclip{width:32px}
.ename{font-size:.88rem;font-weight:800}
.task-list{display:flex;flex-direction:column;gap:6px}
.task-row{display:flex;align-items:center;gap:7px}
.task-num{font-size:.72rem;font-weight:700;color:var(--muted);width:14px;text-align:center;flex-shrink:0}
.task-input{flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:.84rem;font-family:inherit;outline:none;background:#fafafa;transition:border-color .2s}
.task-input:focus{background:#fff}
.ck-btn{width:28px;height:28px;border-radius:8px;border:2px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;transition:all .2s;color:transparent}
.ck-btn.done{color:#fff;border-color:var(--ccc,#667eea);background:var(--ccc,#667eea)}
.add-task-btn{font-size:.75rem;color:var(--muted);background:none;border:1.5px dashed var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;width:100%;transition:all .2s;margin-top:2px}
.add-task-btn:hover{border-color:#667eea;color:#667eea}
.btns{display:flex;gap:8px;margin-top:14px}
.b-save{flex:1;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;padding:11px;font-size:.9rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.b-save:hover{opacity:.88}
.b-del{background:#fee2e2;color:#dc2626;border:none;border-radius:10px;padding:11px 13px;font-size:.83rem;font-weight:700;cursor:pointer}
.b-del:hover{background:#fecaca}
.status{text-align:center;font-size:.78rem;margin-top:7px;min-height:17px;color:var(--muted)}
.status.ok{color:#059669}.status.err{color:#dc2626}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:center;justify-content:center;padding:14px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:20px;padding:22px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:1.1rem;font-weight:800;margin-bottom:2px}
.modal-sub{font-size:.78rem;color:var(--muted);margin-bottom:14px}
.rank-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;background:#f8f7ff;border-radius:12px;padding:10px}
.rrow{display:flex;align-items:center;gap:9px;padding:6px 9px;border-radius:9px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.rnum{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:900;flex-shrink:0}
.rinfo{flex:1}.rname{font-weight:800;font-size:.88rem}.rscore{font-size:.7rem;color:var(--muted)}
.psec-label{font-size:.82rem;font-weight:700;margin-bottom:6px;color:#374151}
.person-sel{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.pbtn{flex:1;min-width:60px;padding:8px 4px;border:2px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;font-size:.83rem;font-weight:700;transition:all .2s;color:var(--text);white-space:nowrap}
.pbtn.active{border-color:#667eea;background:#ede9fe;color:#4338ca}
.char-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:0}
.copt{border:3px solid var(--border);border-radius:12px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:#fafafa}
.copt:hover:not(.taken){transform:scale(1.05);border-color:#667eea;background:#f5f3ff}
.copt.cpicked{border-color:#667eea;background:#ede9fe;box-shadow:0 0 0 2px #667eea44}
.copt.taken{opacity:.42;cursor:not-allowed}
.copt .fw{width:46px;height:46px;margin:0 auto}.copt .fw svg{width:46px;height:46px}.copt .fw .fclip{width:46px}
.copt .cname{font-size:.65rem;font-weight:700;margin-top:3px;color:var(--text)}
.taken-lbl{position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:.56rem;font-weight:700;color:#6366f1}
.mfooter{display:flex;gap:8px;margin-top:14px}
.mbtn{flex:1;padding:10px;border:none;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer}
.mok{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.mno{background:#f3f4f6;color:var(--text)}
#ov{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;font-size:1rem;font-weight:600;color:#667eea}
.sp{width:38px;height:38px;border:4px solid #e9d5ff;border-top-color:#667eea;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:800px){.wrap{flex-direction:column;padding:10px}.panel{width:100%;position:static}.banner{gap:7px}.cc{min-width:80px;padding:9px 10px}.fw{width:50px;height:50px}.fw svg{width:50px;height:50px}.fw .fclip{width:50px}.char-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>

<div id="ov"><div class="sp"></div><span>연결 중…</span></div>
<header>
  <h1>📚 공부 캘린더</h1>
  <p>녕 · 준 · 숭 · 뽀 — 서로의 공부를 응원해요!</p>
</header>
<div class="banner" id="banner"></div>
<div class="pick-area">
  <button class="pick-btn" id="pickBtn">🎭 캐릭터 고르기</button>

</div>

  <div class="cal-wrap">
    <div class="cal-hdr">
      <button class="nav-btn" id="prev">&#9664;</button>
      <h2 id="mlabel"></h2>
      <button class="nav-btn" id="next">&#9654;</button>
    </div>
    <div class="cal-grid">
      <div class="wdays"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>

    <div class="status" id="st"></div>
  </div>
</div>
<div class="modal-bg" id="modalBg">
  <div class="modal">

  </div>
</div>

const PNAMES={ny:'녕',ju:'준',su:'숭',bbo:'뽀'};
const PS=['ny','ju','su','bbo'];
const DEFAULT_PICKS={ny:'bunny',ju:'bear',su:'fox',bbo:'pororo'};
const pad=n=>String(n).padStart(2,'0');
const kStr=(y,m,d)=>y+'-'+pad(m+1)+'-'+pad(d);
const todayK=()=>{const t=new Date();return kStr(t.getFullYear(),t.getMonth(),t.getDate());};
let CY=new Date().getFullYear(),CM=new Date().getMonth();
let sel=null,monthData={},allData={};
let picks=Object.assign({},DEFAULT_PICKS);
let stats={ny:{days:0,streak:0},ju:{days:0,streak:0},su:{days:0,streak:0},bbo:{days:0,streak:0}};
let listenRef=null,listenCb=null;
let pperson=null,pselected=null,pickerStats=null;
function mkSvg(id,sz){
  return '<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" width="'+sz+'" height="'+sz+'">'+CHARS[id].svg+'</svg>';
}
function mkFw(id,sz,fill){
  var fh=Math.round(fill*sz);
  return '<div class="fw" style="width:'+sz+'px;height:'+sz+'px">'+
    '<svg class="grey" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" width="'+sz+'" height="'+sz+'">'+CHARS[id].svg+'</svg>'+
    '<div class="fclip" style="height:'+fh+'px;width:'+sz+'px">'+
      '<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" width="'+sz+'" height="'+sz+'" style="position:absolute;bottom:0;left:0">'+CHARS[id].svg+'</svg>'+
    '</div>'+
  '</div>';
}
function getFill(pData){
  if(!pData)return 0;
  if(typeof pData==='string')return pData.trim()?1:0;
  var total=0,done=0;
  for(var i=1;i<=3;i++){if(pData['t'+i]&&pData['t'+i].trim()){total++;if(pData['c'+i])done++;}}
  return total===0?0:done/total;
}
function hasAnyTask(pData){
  if(!pData)return false;
  if(typeof pData==='string')return pData.trim().length>0;
  for(var i=1;i<=3;i++){if(pData['t'+i]&&pData['t'+i].trim())return true;}
  return false;
}
db.ref('charPick').on('value',function(s){
  var v=s.val();
  if(!v||!v.initialized){
    picks=Object.assign({},DEFAULT_PICKS);
    if(!v)setTimeout(function(){openPicker(true);},800);
  } else {
    PS.forEach(function(p){if(v[p])picks[p]=v[p];});
  }
  renderBanner();
  if(sel)buildEntries();
  updatePickBtn();
});
function calcStats(){
  var today=new Date();
  var curPre=today.getFullYear()+'-'+pad(today.getMonth()+1);
  var ns={ny:{days:0,streak:0},ju:{days:0,streak:0},su:{days:0,streak:0},bbo:{days:0,streak:0}};
  var src=monthData;
  if(CY!==today.getFullYear()||CM!==today.getMonth()){
    src={};
    Object.keys(allData).forEach(function(k){if(k.startsWith(curPre))src[k]=allData[k];});
  }
  Object.values(src).forEach(function(v){
    if(!v)return;
    PS.forEach(function(p){if(hasAnyTask(v[p]))ns[p].days++;});
  });
  PS.forEach(function(p){
    var st=0,d=new Date(today);
    for(var i=0;i<90;i++){
      var k=kStr(d.getFullYear(),d.getMonth(),d.getDate());
      var vv=Object.assign({},allData[k]||{},monthData[k]||{});
      if(hasAnyTask(vv[p])){st++;d.setDate(d.getDate()-1);}else break;
    }
    ns[p].streak=st;
  });
  stats=ns;
  renderBanner();
}
function getRanks(baseStats){
  var s=baseStats||stats;
  return PS.map(function(p){return{p:p,score:s[p].days*2+(s[p].streak||0)};}).sort(function(a,b){return b.score-a.score;});
}
function renderBanner(){
  var ranks=getRanks();var rankOf={};ranks.forEach(function(r,i){rankOf[r.p]=i+1;});
  var todayAll=Object.assign({},allData[todayK()]||{},monthData[todayK()]||{});
  var bn=document.getElementById('banner');if(!bn)return;
  bn.innerHTML='';
  var medals=['👑','🥈','🥉','🏅'];
  var rcls=['r1','r2','r3','r4'];
  PS.forEach(function(p){
    var ch=CHARS[picks[p]],rank=rankOf[p],s=stats[p];
    var fill=getFill(todayAll[p]);
    var d=document.createElement('div');
    d.className='cc';d.id='c-'+p;
    d.style.cssText='--cc:'+ch.color+';--ccl:'+ch.light+';--ccd:'+ch.dark+';--ccc:'+ch.color;
    var streakHtml=s.streak>0?'<span class="sb sb-s">🔥'+s.streak+'일</span>':'';
    d.innerHTML='<div class="rank-badge '+rcls[rank-1]+'">'+medals[rank-1]+'</div>'+
      mkFw(picks[p],58,fill)+
      '<span class="cn">'+PNAMES[p]+'</span>'+
      '<div class="stats-row"><span class="sb sb-d">📅'+s.days+'일</span>'+streakHtml+'</div>';
    bn.appendChild(d);
  });
}
function listen(y,m){
  if(listenRef&&listenCb){listenRef.off('value',listenCb);listenRef=null;listenCb=null;}
  var pre=y+'-'+pad(m+1);
  listenRef=db.ref('studyLogs').orderByKey().startAt(pre+'-01').endAt(pre+'-31');
  listenCb=listenRef.on('value',function(s){
    monthData={};s.forEach(function(c){monthData[c.key]=c.val();});
    render();if(sel)refresh();
    document.getElementById('ov').style.display='none';
    calcStats();
  },function(e){console.error(e);document.getElementById('ov').style.display='none';});
}
function render(){
  document.getElementById('mlabel').textContent=CY+'년 '+(CM+1)+'월';
  var c=document.getElementById('days');c.innerHTML='';
  var fd=new Date(CY,CM,1).getDay(),dim=new Date(CY,CM+1,0).getDate(),dip=new Date(CY,CM,0).getDate();
  for(var i=0;i<fd;i++)c.appendChild(cell(CY,CM-1,dip-fd+1+i,true));
  for(var d=1;d<=dim;d++)c.appendChild(cell(CY,CM,d,false));
  var tr=(fd+dim)%7===0?0:7-(fd+dim)%7;
  for(var d2=1;d2<=tr;d2++)c.appendChild(cell(CY,CM+1,d2,true));
}
function cell(y,m,d,om){
  var k=kStr(y,m,d),div=document.createElement('div');
  var dow=new Date(y,m,d).getDay();
  div.className='day'+(dow===0?' sun':dow===6?' sat':'')+(om?' om':'')+(k===todayK()?' today':'')+(k===sel?' sel':'');
  var dn=document.createElement('div');dn.className='dn';dn.textContent=d;div.appendChild(dn);
  var v=monthData[k];
  if(v){
    var dr=document.createElement('div');dr.className='dots';
    PS.forEach(function(p){if(hasAnyTask(v[p])){var dot=document.createElement('div');dot.className='dot';dot.style.background=CHARS[picks[p]].color;dr.appendChild(dot);}});
    if(dr.children.length)div.appendChild(dr);
  }
  div.onclick=function(){sel=k;openPanel(k);render();};
  return div;
}
function openPanel(k){
  document.getElementById('panel').classList.add('open');
  var parts=k.split('-');var y=parts[0],m=parts[1],d=parts[2];
  var w=['일','월','화','수','목','금','토'];
  document.getElementById('ptitle').textContent=y+'년 '+(+m)+'월 '+(+d)+'일 ('+w[new Date(+y,+m-1,+d).getDay()]+')';
  buildEntries();refresh();
}
function buildEntries(){
  var el=document.getElementById('entries');el.innerHTML='';
  PS.forEach(function(p){
    var ch=CHARS[picks[p]];
    var vAll=monthData[sel]||{};var vp=vAll[p]||{};
    if(typeof vp==='string'&&vp.trim())vp={t1:vp,c1:true};
    var fill=getFill(vp);
    var secDiv=document.createElement('div');secDiv.className='entry';
    secDiv.innerHTML='<div class="e-hdr">'+mkFw(picks[p],32,fill)+'<span class="ename" style="color:'+ch.dark+'">'+PNAMES[p]+'의 공부</span></div>';
    var tlist=document.createElement('div');tlist.className='task-list';tlist.id='tl-'+p;
    var existing=[];
    for(var i=1;i<=3;i++){if(vp['t'+i]&&vp['t'+i].trim())existing.push({t:vp['t'+i],c:!!vp['c'+i]});}
    var count=Math.max(1,existing.length);
    for(var i2=0;i2<count;i2++){tlist.appendChild(makeTaskRow(p,i2+1,existing[i2]||null,ch.color));}
    if(count<3){
      var addBtn=document.createElement('button');addBtn.className='add-task-btn';addBtn.textContent='+ 추가';
      (function(pp,cnt,c){addBtn.onclick=function(){if(cnt<3){var tl=document.getElementById('tl-'+pp);tl.appendChild(makeTaskRow(pp,cnt+1,null,c));cnt++;if(cnt>=3)addBtn.remove();updateEntryFill(pp);}};}) (p,count,ch.color);
      tlist.appendChild(addBtn);
    }
    secDiv.appendChild(tlist);el.appendChild(secDiv);
  });
}
function makeTaskRow(p,idx,data,color){
  var row=document.createElement('div');row.className='task-row';row.id='tr-'+p+'-'+idx;
  var num=document.createElement('span');num.className='task-num';num.textContent=idx;
  var inp=document.createElement('input');inp.type='text';inp.className='task-input';inp.id='ti-'+p+'-'+idx;inp.placeholder='공부할 내용…';inp.style.borderColor=color;
  if(data&&data.t)inp.value=data.t;
  inp.oninput=function(){updateEntryFill(p);};
  var ckBtn=document.createElement('button');ckBtn.className='ck-btn';ckBtn.id='ck-'+p+'-'+idx;ckBtn.style.setProperty('--ccc',color);ckBtn.textContent='✓';
  if(data&&data.c)ckBtn.classList.add('done');
  ckBtn.onclick=function(){ckBtn.classList.toggle('done');updateEntryFill(p);};
  row.appendChild(num);row.appendChild(inp);row.appendChild(ckBtn);
  return row;
}
function updateEntryFill(p){
  var vp={};
  for(var i=1;i<=3;i++){var inp=document.getElementById('ti-'+p+'-'+i);var ck=document.getElementById('ck-'+p+'-'+i);if(inp&&inp.value.trim()){vp['t'+i]=inp.value.trim();vp['c'+i]=ck&&ck.classList.contains('done');}}
  var fill=getFill(vp);
  var idx=PS.indexOf(p)+1;
  var eHdr=document.querySelector('#entries .entry:nth-child('+idx+') .e-hdr .fw .fclip');
  if(eHdr)eHdr.style.height=Math.round(fill*32)+'px';
}
function refresh(){
  if(!sel)return;
  var v=Object.assign({},monthData[sel]||{});
  PS.forEach(function(p){
    var el=document.getElementById('c-'+p);if(!el)return;
    if(hasAnyTask(v[p])){el.classList.add('active');}else{el.classList.remove('active');}
  });
  document.getElementById('st').textContent='';document.getElementById('st').className='status';
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');sel=null;render();
  PS.forEach(function(p){var el=document.getElementById('c-'+p);if(el)el.classList.remove('active');});
}
async function save(){
  if(!sel)return;
  var vals={};
  PS.forEach(function(p){
    var obj={};
    for(var i=1;i<=3;i++){
      var inp=document.getElementById('ti-'+p+'-'+i);var ck=document.getElementById('ck-'+p+'-'+i);
      if(inp&&inp.value.trim()){obj['t'+i]=inp.value.trim();obj['c'+i]=!!(ck&&ck.classList.contains('done'));}
    }
    if(Object.keys(obj).length>0)vals[p]=obj;
  });
  var st=document.getElementById('st');st.className='status';st.textContent='저장 중…';
  try{
    if(Object.keys(vals).length===0)await db.ref('studyLogs/'+sel).remove();
    else await db.ref('studyLogs/'+sel).set(vals);
    st.textContent='✅ 저장되었어요!';st.className='status ok';
  }catch(e){st.textContent='❌ 오류: '+e.message;st.className='status err';}
}
async function del(){
  if(!sel||!confirm('이 날의 기록을 모두 삭제할까요?'))return;
  var st=document.getElementById('st');st.className='status';st.textContent='삭제 중…';
  try{
    await db.ref('studyLogs/'+sel).remove();
    buildEntries();
    st.textContent='🗑 삭제되었어요!';st.className='status ok';
  }catch(e){st.textContent='❌ 실패: '+e.message;st.className='status err';}
}
function isPickerWeek(){return new Date().getDate()<=7;}
function getPrevMonthPre(){
  var today=new Date();
  var pm=new Date(today.getFullYear(),today.getMonth()-1,1);
  return pm.getFullYear()+'-'+pad(pm.getMonth()+1);
}
async function loadPickerStats(){
  var pre=getPrevMonthPre();
  var snap=await db.ref('studyLogs').orderByKey().startAt(pre+'-01').endAt(pre+'-31').once('value');
  var ns={ny:{days:0,streak:0},ju:{days:0,streak:0},su:{days:0,streak:0},bbo:{days:0,streak:0}};
  snap.forEach(function(c){
    var v=c.val();if(!v)return;
    PS.forEach(function(p){if(hasAnyTask(v[p]))ns[p].days++;});
  });
  return ns;
}
function updatePickBtn(){
  var btn=document.getElementById('pickBtn');
  var note=document.getElementById('pickNote');
  if(!btn)return;
  db.ref('charPick/initialized').once('value',function(s){
    var init=s.val();
    if(!init){
      btn.disabled=false;btn.textContent='🎭 캐릭터 고르기';
      if(note)note.textContent='처음 시작할 때 고르는 거예요!';
    } else if(isPickerWeek()){
      btn.disabled=false;btn.textContent='🎭 캐릭터 고르기 ('+(new Date().getMonth()+1)+'월)';
      if(note)note.textContent='전월 점수 기준 순위대로 먼저 고를 수 있어요 ('+new Date().getDate()+'/7일)';
    } else {
      btn.disabled=true;btn.textContent='🔒 캐릭터 고르기';
      var nextMonth=new Date().getMonth()+2;if(nextMonth>12)nextMonth=1;
      if(note)note.textContent='다음 달 '+nextMonth+'월 1일~7일에 고를 수 있어요';
    }
  });
}
async function openPicker(isOnboarding){
  pperson=null;pselected=null;
  if(!isOnboarding&&!isPickerWeek())return;
  if(!isOnboarding){
    pickerStats=await loadPickerStats();
  } else {
    pickerStats={ny:{days:0,streak:0},ju:{days:0,streak:0},su:{days:0,streak:0},bbo:{days:0,streak:0}};
  }
  var mt=document.getElementById('modalTitle');
  var ms=document.getElementById('modalSub');
  if(isOnboarding){
    mt.textContent='🎉 처음 시작! 캐릭터를 고르세요';
    ms.textContent='네 명 모두 자신의 캐릭터를 선택해 주세요! (앱 시작 시 1회만 선택)';
  } else {
    mt.textContent='🎭 캐릭터 고르기';
    ms.textContent='지난 달 공부 점수가 높은 사람이 먼저 고를 수 있어요! (점수 = 공부일×2 + 연속일)';
  }
  renderRankList(isOnboarding);renderPersonSel();renderCharGrid();
  document.getElementById('modalBg').classList.add('show');
}
function renderRankList(isOnboarding){
  var ranks=getRanks(pickerStats);
  var medals=['🥇','🥈','🥉','🏅'];
  var cols=['#f59e0b','#94a3b8','#b45309','#6b7280'];
  var el=document.getElementById('rankList');el.innerHTML='';
  if(isOnboarding){el.innerHTML='<div style="font-size:.82rem;color:#6b7280;padding:8px 12px">시작전이라 랜킹은 동등! 원하는 캐릭터를 고르세요 😀</div>';return;}
  ranks.forEach(function(r,i){
    var p=r.p,s=pickerStats[p];
    var d=document.createElement('div');d.className='rrow';
    d.innerHTML='<div class="rnum" style="background:'+cols[i]+';color:#fff">'+medals[i]+'</div>'+
      mkSvg(picks[p],28)+
      '<div class="rinfo"><div class="rname">'+PNAMES[p]+'</div>'+
      '<div class="rscore">지난달 '+s.days+'일 &middot; 점수 '+r.score+'점</div></div>';
    el.appendChild(d);
  });
}
function renderPersonSel(){
  var ranks=getRanks(pickerStats);
  var el=document.getElementById('personSel');el.innerHTML='';
  ranks.forEach(function(r){
    var p=r.p;var btn=document.createElement('button');btn.className='pbtn';
    btn.innerHTML=mkSvg(picks[p],20)+' '+PNAMES[p];
    btn.onclick=function(){pperson=p;pselected=picks[p];document.querySelectorAll('.pbtn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderCharGrid();};
    el.appendChild(btn);
  });
}
function renderCharGrid(){
  var el=document.getElementById('charGrid');el.innerHTML='';
  var takenBy={};PS.forEach(function(p){takenBy[picks[p]]=p;});
  Object.keys(CHARS).forEach(function(id){
    var ch=CHARS[id];
    var div=document.createElement('div');
    var takenOther=takenBy[id]&&takenBy[id]!==pperson;
    var isSelected=pselected===id;
    div.className='copt'+(isSelected?' cpicked':'')+(takenOther?' taken':'');
    div.innerHTML=mkFw(id,46,isSelected?1:0)+'<div class="cname">'+ch.name+'</div>';
    if(takenOther){var tl=document.createElement('div');tl.className='taken-lbl';tl.textContent=PNAMES[takenBy[id]];div.appendChild(tl);}
    if(!takenOther){div.onclick=function(){if(!pperson){alert('먼저 내 이름을 선택해주세요!');return;}pselected=id;renderCharGrid();};}
    el.appendChild(div);
  });
}
async function confirmPick(){
  if(!pperson){alert('내 이름을 먼저 선택해주세요!');return;}
  if(!pselected){alert('캐릭터를 선택해주세요!');return;}
  var takenBy={};PS.forEach(function(p){if(p!==pperson)takenBy[picks[p]]=p;});
  if(takenBy[pselected]){alert(PNAMES[takenBy[pselected]]+'이 이미 선택한 캐릭터예요!');return;}
  var newPicks=Object.assign({},picks);newPicks[pperson]=pselected;newPicks.initialized=true;
  try{
    await db.ref('charPick').set(newPicks);
    closePicker();updatePickBtn();
  }catch(e){alert('저장 실패: '+e.message);}
}
function closePicker(){
  document.getElementById('modalBg').classList.remove('show');pperson=null;pselected=null;
}
document.getElementById('prev').onclick=function(){CM--;if(CM<0){CM=11;CY--;}sel=null;document.getElementById('panel').classList.remove('open');listen(CY,CM);};
document.getElementById('next').onclick=function(){CM++;if(CM>11){CM=0;CY++;}sel=null;document.getElementById('panel').classList.remove('open');listen(CY,CM);};
document.getElementById('xbtn').onclick=closePanel;
document.getElementById('bsave').onclick=save;
document.getElementById('bdel').onclick=del;
document.getElementById('pickBtn').onclick=function(){
  db.ref('charPick/initialized').once('value',function(s){openPicker(!s.val());});
};
document.getElementById('mCancel').onclick=closePicker;
document.getElementById('mConfirm').onclick=confirmPick;
document.getElementById('modalBg').onclick=function(e){if(e.target===document.getElementById('modalBg'))closePicker();};
(async function(){
  var today=new Date();
  var start=new Date(today);start.setDate(start.getDate()-89);
  var sk=kStr(start.getFullYear(),start.getMonth(),start.getDate());
  var ek=kStr(today.getFullYear(),today.getMonth(),today.getDate());
  var snap=await db.ref('studyLogs').orderByKey().startAt(sk).endAt(ek).once('value');
  snap.forEach(function(c){allData[c.key]=c.val();});
  calcStats();
  updatePickBtn();
})();
listen(CY,CM);
</script>
