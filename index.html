<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>📚 공부 캘린더 – 녕·준·숭</title>
  <style>
    :root{--ny:#c084fc;--ny-l:#f3e8ff;--ny-d:#7e22ce;--ju:#fb923c;--ju-l:#fff7ed;--ju-d:#c2410c;--su:#34d399;--su-l:#ecfdf5;--su-d:#065f46;--bg:#f8f7ff;--card:#fff;--text:#1e1b4b;--muted:#9ca3af;--border:#e5e7eb;--r:16px;--sh:0 4px 20px rgba(0,0,0,.08)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Segoe UI","Apple SD Gothic Neo",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px 24px 16px;text-align:center}
    header h1{font-size:1.6rem;font-weight:800;letter-spacing:-.5px}
    header p{font-size:.85rem;opacity:.85;margin-top:4px}
    .banner{display:flex;gap:16px;justify-content:center;padding:20px 16px 0}
    .cc{display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--card);border-radius:var(--r);padding:14px 20px;box-shadow:var(--sh);border:3px solid var(--border);transition:all .3s;min-width:90px}
    .cc svg{width:64px;height:64px}
    .cc .cn{font-size:1rem;font-weight:800}
    .cc.a-ny{border-color:var(--ny);background:var(--ny-l)}.cc.a-ju{border-color:var(--ju);background:var(--ju-l)}.cc.a-su{border-color:var(--su);background:var(--su-l)}
    .cn.ny{color:var(--ny-d)}.cn.ju{color:var(--ju-d)}.cn.su{color:var(--su-d)}
    .cc.inactive svg{filter:grayscale(80%) opacity(.4)}.cc.inactive .cn{color:var(--muted)}
    .wrap{display:flex;gap:20px;padding:20px 20px 40px;max-width:1100px;margin:0 auto;align-items:flex-start}
    .cal-wrap{flex:1;min-width:0}
    .cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .cal-hdr h2{font-size:1.25rem;font-weight:800}
    .nav-btn{background:var(--card);border:2px solid var(--border);border-radius:10px;width:38px;height:38px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .nav-btn:hover{background:#ede9fe;border-color:var(--ny)}
    .cal-grid{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
    .wdays{display:grid;grid-template-columns:repeat(7,1fr);background:linear-gradient(135deg,#667eea,#764ba2)}
    .wdays span{text-align:center;padding:10px 0;font-size:.78rem;font-weight:700;color:rgba(255,255,255,.9)}
    .days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
    .day{background:var(--card);min-height:72px;padding:8px 8px 6px;cursor:pointer;transition:background .15s}
    .day:hover{background:#f5f3ff}.day.sel{background:#ede9fe}.day.om{background:#fafafa}.day.om .dn{color:var(--muted)}
    .day.today .dn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
    .dn{font-size:.85rem;font-weight:700;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
    .day.sun .dn{color:#ef4444}.day.sat .dn{color:#3b82f6}
    .day.today.sun .dn,.day.today.sat .dn{color:#fff}
    .dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
    .dot{width:8px;height:8px;border-radius:50%}
    .dot.ny{background:var(--ny)}.dot.ju{background:var(--ju)}.dot.su{background:var(--su)}
    .panel{width:340px;flex-shrink:0;background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:20px;display:none;position:sticky;top:20px}
    .panel.open{display:block}
    .p-hdr{font-size:1.15rem;font-weight:800;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .xbtn{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);line-height:1;padding:0 4px}
    .xbtn:hover{color:var(--text)}
    .entry{margin-bottom:14px}
    .e-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .e-hdr svg{width:36px;height:36px}
    .ename{font-size:.95rem;font-weight:800}
    .ename.ny{color:var(--ny-d)}.ename.ju{color:var(--ju-d)}.ename.su{color:var(--su-d)}
    textarea{width:100%;min-height:72px;border:2px solid var(--border);border-radius:10px;padding:10px 12px;font-size:.88rem;font-family:inherit;resize:vertical;outline:none;transition:border-color .2s;background:#fafafa}
    textarea.ny:focus{border-color:var(--ny);background:var(--ny-l)}
    textarea.ju:focus{border-color:var(--ju);background:var(--ju-l)}
    textarea.su:focus{border-color:var(--su);background:var(--su-l)}
    .btns{display:flex;gap:8px;margin-top:16px}
    .b-save{flex:1;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;padding:12px;font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .2s}
    .b-save:hover{opacity:.88}
    .b-del{background:#fee2e2;color:#dc2626;border:none;border-radius:10px;padding:12px 14px;font-size:.88rem;font-weight:700;cursor:pointer}
    .b-del:hover{background:#fecaca}
    .status{text-align:center;font-size:.8rem;margin-top:8px;min-height:18px;color:var(--muted)}
    .status.ok{color:#059669}.status.err{color:#dc2626}
    #ov{position:fixed;inset:0;background:rgba(255,255,255,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;font-size:1rem;font-weight:600;color:#667eea}
    .sp{width:40px;height:40px;border:4px solid #e9d5ff;border-top-color:#667eea;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:700px){.wrap{flex-direction:column;padding:12px}.panel{width:100%;position:static}.banner{gap:10px}.cc{padding:10px 14px;min-width:76px}.cc svg{width:52px;height:52px}}
  </style>
</head>

<script>
const cfg={apiKey:"AIzaSyBjlWA9GHPvL4sGEdOShwyaCnPDuLgIcPA",authDomain:"studylog-cd02a.firebaseapp.com",databaseURL:"https://studylog-cd02a-default-rtdb.firebaseio.com",projectId:"studylog-cd02a",storageBucket:"studylog-cd02a.firebasestorage.app",messagingSenderId:"714212261002",appId:"1:714212261002:web:075c8c992ba986b5a9c173"};
firebase.initializeApp(cfg);
const db=firebase.database();
let Y=new Date().getFullYear(),M=new Date().getMonth(),sel=null,data={},listenRef=null,listenCb=null;
const pad=n=>String(n).padStart(2,'0');
const key=(y,m,d)=>y+'-'+pad(m+1)+'-'+pad(d);
const today=()=>{const t=new Date();return key(t.getFullYear(),t.getMonth(),t.getDate());}
function listen(y,m){
  if(listenRef&&listenCb){listenRef.off('value',listenCb);listenRef=null;listenCb=null;}
  const pre=y+'-'+pad(m+1);
  listenRef=db.ref('studyLogs').orderByKey().startAt(pre+'-01').endAt(pre+'-31');
  listenCb=listenRef.on('value',s=>{data={};s.forEach(c=>{data[c.key]=c.val();});render();if(sel)refresh();document.getElementById('ov').style.display='none';},
    e=>{console.error(e);document.getElementById('ov').style.display='none';});
}
function render(){
  document.getElementById('mlabel').textContent=Y+'년 '+(M+1)+'월';
  const c=document.getElementById('days');c.innerHTML='';
  const fd=new Date(Y,M,1).getDay(),dim=new Date(Y,M+1,0).getDate(),dip=new Date(Y,M,0).getDate();
  for(let i=0;i<fd;i++)c.appendChild(cell(Y,M-1,dip-fd+1+i,true));
  for(let d=1;d<=dim;d++)c.appendChild(cell(Y,M,d,false));
  const tr=(fd+dim)%7===0?0:7-(fd+dim)%7;
  for(let d=1;d<=tr;d++)c.appendChild(cell(Y,M+1,d,true));
}
function cell(y,m,d,om){
  const k=key(y,m,d),div=document.createElement('div');
  div.className='day'+(new Date(y,m,d).getDay()===0?' sun':new Date(y,m,d).getDay()===6?' sat':'')+(om?' om':'')+(k===today()?' today':'')+(k===sel?' sel':'');
  const dn=document.createElement('div');dn.className='dn';dn.textContent=d;div.appendChild(dn);
  const v=data[k];
  if(v){const dr=document.createElement('div');dr.className='dots';
    if(v.ny&&v.ny.trim()){const dot=document.createElement('div');dot.className='dot ny';dr.appendChild(dot);}
    if(v.ju&&v.ju.trim()){const dot=document.createElement('div');dot.className='dot ju';dr.appendChild(dot);}
    if(v.su&&v.su.trim()){const dot=document.createElement('div');dot.className='dot su';dr.appendChild(dot);}
    if(dr.children.length)div.appendChild(dr);}
  div.onclick=()=>{sel=k;open(k);render();};
  return div;
}
function open(k){
  document.getElementById('panel').classList.add('open');
  const[y,m,d]=k.split('-');
  const w=['일','월','화','수','목','금','토'];
  document.getElementById('ptitle').textContent=y+'년 '+(+m)+'월 '+(+d)+'일 ('+w[new Date(+y,+m-1,+d).getDay()]+')';
  refresh();
}
function refresh(){
  if(!sel)return;
  const v=data[sel]||{};
  document.getElementById('ta-ny').value=v.ny||'';
  document.getElementById('ta-ju').value=v.ju||'';
  document.getElementById('ta-su').value=v.su||'';
  banner(v);
  document.getElementById('st').textContent='';document.getElementById('st').className='status';
}
function banner(v){
  sc('c-ny','a-ny',v&&v.ny&&v.ny.trim());
  sc('c-ju','a-ju',v&&v.ju&&v.ju.trim());
  sc('c-su','a-su',v&&v.su&&v.su.trim());
}
function sc(id,ac,on){const e=document.getElementById(id);e.classList.remove('inactive',ac);e.classList.add(on?ac:'inactive');}
function close(){document.getElementById('panel').classList.remove('open');sel=null;render();['c-ny','c-ju','c-su'].forEach(id=>{document.getElementById(id).className='cc inactive';});}
async function save(){
  if(!sel)return;
  const ny=document.getElementById('ta-ny').value.trim(),ju=document.getElementById('ta-ju').value.trim(),su=document.getElementById('ta-su').value.trim();
  const st=document.getElementById('st');st.className='status';st.textContent='저장 중…';
  try{
    if(!ny&&!ju&&!su)await db.ref('studyLogs/'+sel).remove();
    else await db.ref('studyLogs/'+sel).set({ny,ju,su});
    st.textContent='✅ 저장됩니다!';st.className='status ok';
  }catch(e){st.textContent='❌ 오류: '+e.message;st.className='status err';}
}
async function del(){
  if(!sel||!confirm('이 날의 기록을 모두 삭제할까요?'))return;
  const st=document.getElementById('st');st.className='status';st.textContent='삭제 중…';
  try{
    await db.ref('studyLogs/'+sel).remove();
    ['ta-ny','ta-ju','ta-su'].forEach(id=>{document.getElementById(id).value='';});
    st.textContent='🗑 삭제되었어요!';st.className='status ok';
  }catch(e){st.textContent='❌ 실패: '+e.message;st.className='status err';}
}
document.getElementById('prev').onclick=()=>{M--;if(M<0){M=11;Y--;}sel=null;document.getElementById('panel').classList.remove('open');listen(Y,M);};
document.getElementById('next').onclick=()=>{M++;if(M>11){M=0;Y++;}sel=null;document.getElementById('panel').classList.remove('open');listen(Y,M);};
document.getElementById('xbtn').onclick=close;
document.getElementById('bsave').onclick=save;
document.getElementById('bdel').onclick=del;
listen(Y,M);
</script>
